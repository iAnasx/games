<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>سين جيم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#04060F;--gold:#F6C90E;--gold2:#D4A90A;--neon:#00D4FF;--green:#10B981;--red:#EF4444;--txt:#E8ECF1;--dim:rgba(255,255,255,.3);--r:14px;--rl:22px;--fd:'Readex Pro',sans-serif;--fb:'Tajawal',sans-serif;--e:cubic-bezier(.4,0,.2,1);--eb:cubic-bezier(.34,1.56,.64,1)}
html,body,#root{min-height:100vh;overflow-x:hidden}
body{font-family:var(--fb);direction:rtl;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
input,select{font-family:var(--fb)}input::placeholder{color:rgba(255,255,255,.2)}
input:focus,select:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(246,201,14,.08)}
button{font-family:var(--fb);cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
button:disabled{opacity:.25;cursor:not-allowed}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes orbM{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-30px)}66%{transform:translate(-15px,20px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes tmGlow{0%,100%{text-shadow:0 0 10px rgba(246,201,14,.2)}50%{text-shadow:0 0 35px rgba(246,201,14,.5)}}
@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes letterBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-5px) rotate(1deg)}}
@keyframes cellIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
@keyframes spinPick{0%{transform:rotate(0) scale(1)}50%{transform:rotate(540deg) scale(1.3)}100%{transform:rotate(1080deg) scale(1)}}
@keyframes dblGlow{0%,100%{box-shadow:0 0 15px rgba(246,201,14,.2)}50%{box-shadow:0 0 40px rgba(246,201,14,.4)}}
@keyframes goldenShine{0%,100%{box-shadow:0 0 20px rgba(246,201,14,.15)}50%{box-shadow:0 0 50px rgba(246,201,14,.35),0 0 80px rgba(246,201,14,.15)}}
@keyframes trapPulse{0%,100%{box-shadow:0 0 15px rgba(239,68,68,.1)}50%{box-shadow:0 0 40px rgba(239,68,68,.25)}}
@keyframes bonusPop{from{opacity:0;transform:scale(.5) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes stealGlow{0%,100%{border-color:rgba(168,85,247,.3)}50%{border-color:rgba(168,85,247,.7)}}

.btn{font-weight:700;font-size:15px;padding:12px 24px;border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .25s var(--e);line-height:1.3}
.btn:not(:disabled):hover{transform:translateY(-2px)}.btn:not(:disabled):active{transform:scale(.96)!important}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;font-weight:800;box-shadow:0 4px 20px rgba(246,201,14,.15)}
.btn-lg{width:100%;font-size:18px;padding:16px 32px;border-radius:var(--rl)}
.btn-ghost{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06)}

/* ═══ SETUP ═══ */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;overflow:hidden}
.setup::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(246,201,14,.03),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(0,212,255,.02),transparent 50%)}
.orb{position:absolute;border-radius:50%;pointer-events:none;will-change:transform;filter:blur(80px)}
.o1{width:500px;height:500px;background:rgba(246,201,14,.05);top:-15%;right:-10%;animation:orbM 20s ease-in-out infinite}
.o2{width:400px;height:400px;background:rgba(0,212,255,.04);bottom:-10%;left:-8%;animation:orbM 25s ease-in-out infinite 5s}
.scard{position:relative;z-index:1;width:100%;max-width:880px;background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(255,255,255,.008));backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.04);border-radius:28px;padding:48px 40px;animation:fadeUp .6s var(--e)}
.logo{text-align:center;margin-bottom:6px}.logo-m{font-family:var(--fd);font-size:68px;font-weight:700;letter-spacing:2px}
.ls{background:linear-gradient(135deg,var(--gold),#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lj{background:linear-gradient(135deg,#FF6B6B,#E63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:16px}
.lsub{font-size:15px;color:var(--dim);text-align:center;margin-bottom:40px;letter-spacing:2px}
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px}
.pip{height:4px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .4s;width:24px}
.pip.on{background:var(--gold);width:48px;box-shadow:0 0 12px rgba(246,201,14,.2)}.pip.ok{background:var(--green)}
.stitle{font-family:var(--fd);font-size:21px;font-weight:600;text-align:center;margin-bottom:24px}
.fs{animation:fadeUp .3s var(--e)}
.t-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.tc{flex:1;min-width:280px;max-width:400px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--rl);padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.tlbl{font-size:11px;font-weight:800;letter-spacing:3px;color:var(--dim)}
.teb{font-size:36px;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.08);transition:all .2s}
.edd{background:#10142A;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-width:300px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fadeUp .15s}
.eo{font-size:20px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:2px solid transparent;transition:all .1s}
.eo:hover{background:rgba(255,255,255,.08)}.eo.sel{background:rgba(246,201,14,.1);border-color:var(--gold)}
.tinp{width:100%;padding:11px 16px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#fff;font-size:17px;text-align:center;font-weight:700}
.crow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;border:2.5px solid transparent}
.cdot:hover{transform:scale(1.15)}.cdot.sel{border-color:rgba(255,255,255,.9);box-shadow:0 0 14px currentColor}
.vsp{font-family:var(--fd);font-size:18px;color:rgba(255,255,255,.06);align-self:center;letter-spacing:8px}
.ctls{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:24px;max-height:360px;overflow-y:auto;padding:2px}
.cc{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 6px 10px;border-radius:var(--r);border:1.5px solid transparent;color:#fff;transition:all .2s;background:rgba(255,255,255,.03);cursor:pointer;overflow:hidden}
.cc:hover:not(.full){background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.cc.sel{border-color:currentColor}.cc.full:not(.sel){opacity:.15;pointer-events:none}
.cci{font-size:28px;z-index:1}.ccn{font-size:12px;font-weight:800;text-align:center;z-index:1;line-height:1.3}
.cct{font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);z-index:1}
.cck{position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;z-index:2}
.ccg{position:absolute;bottom:-20px;width:80px;height:40px;border-radius:50%;filter:blur(20px);opacity:0;transition:opacity .3s}.cc.sel .ccg{opacity:.3}

/* ═══ BOARD ═══ */
.board{min-height:100vh;display:flex;flex-direction:column;position:relative;padding:0 14px 14px;background:#04060F}
.bbg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bbg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(246,201,14,.02),transparent),radial-gradient(ellipse 30% 50% at 0% 50%,rgba(0,212,255,.015),transparent),radial-gradient(ellipse 30% 50% at 100% 50%,rgba(168,85,247,.01),transparent)}
.bbg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);background-size:60px 60px}
.bhdr{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;gap:8px;position:relative;z-index:1}
.blogo{font-family:var(--fd);font-size:22px;font-weight:700}
.bacts{display:flex;gap:6px;align-items:center}
.abtn{font-size:11px;padding:6px 12px;border-radius:8px;font-weight:700;display:flex;align-items:center;gap:4px;transition:all .2s}
.abtn:hover{transform:translateY(-1px)}
.ab-r{background:rgba(168,85,247,.12);color:#C084FC;border:1px solid rgba(168,85,247,.2)}
.ab-e{background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.06)}
.prog{height:2px;background:rgba(255,255,255,.03);border-radius:2px;margin:0 4px 12px;overflow:hidden;position:relative;z-index:1}
.pbar{height:100%;background:linear-gradient(90deg,var(--gold),var(--neon));border-radius:2px;transition:width .6s var(--e)}

.bgrd{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;position:relative;z-index:1}
@media(max-width:920px){.bgrd{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.bgrd{grid-template-columns:1fr}}

.cblk{border-radius:var(--rl);overflow:hidden;display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:repeat(3,1fr);min-height:210px;position:relative;animation:cellIn .4s var(--eb) both;background:linear-gradient(160deg,rgba(255,255,255,.03),rgba(255,255,255,.005));border:1px solid rgba(255,255,255,.05)}
.cblk::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;border-radius:0 0 4px 4px;opacity:.6}
.bmid{grid-column:2;grid-row:1/4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 18px;gap:6px;min-width:90px;position:relative;z-index:1}
.bmid::before,.bmid::after{content:'';position:absolute;top:8%;bottom:8%;width:1px}
.bmid::before{right:0;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent)}
.bmid::after{left:0;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent)}
.bm-ring{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid rgba(255,255,255,.06)}
.bm-nm{font-family:var(--fd);font-size:11px;font-weight:600;text-align:center;line-height:1.2;max-width:80px;color:rgba(255,255,255,.55)}
.bm-tp{font-size:7px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);font-weight:700}

/* ═══ QUESTION TILES ═══ */
.qc{display:flex;align-items:center;justify-content:center;padding:18px 4px;color:#fff;font-family:var(--fd);transition:all .3s var(--e);position:relative;overflow:hidden;border-radius:10px;margin:4px;cursor:pointer;background:linear-gradient(145deg,#0F1328,#0A0E20,#080B1A);border:1px solid rgba(255,255,255,.06);box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03)}
.qc::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:all .3s}
.qc::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;border-radius:2px;opacity:.2;transition:all .3s}
.qc.t2{background:linear-gradient(145deg,#0D1225,#0B0F1F);border-color:rgba(100,160,255,.08)}.qc.t2::after{background:linear-gradient(90deg,transparent,rgba(100,160,255,.5),transparent)}
.qc.t4{background:linear-gradient(145deg,#12102A,#0E0C22);border-color:rgba(168,85,247,.08)}.qc.t4::after{background:linear-gradient(90deg,transparent,rgba(168,85,247,.5),transparent)}
.qc.t6{background:linear-gradient(145deg,#1A1508,#141005);border-color:rgba(246,201,14,.1)}.qc.t6::after{background:linear-gradient(90deg,transparent,rgba(246,201,14,.5),transparent)}
.qc:not(.done):hover{transform:translateY(-2px);border-color:rgba(255,255,255,.12);box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}
.qc:not(.done):hover::before{left:5%;right:5%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.qc:not(.done):hover::after{opacity:.6;left:10%;right:10%}
.qc:not(.done):hover .qv{transform:scale(1.15);text-shadow:0 0 20px currentColor}
.qc:not(.done):active{transform:scale(.95)!important}
.qc.done{cursor:default;transform:none;border-color:transparent}.qc.done::before,.qc.done::after{opacity:0}
.qc.golden:not(.done){animation:goldenShine 2s ease-in-out infinite}
.qc.trap:not(.done){animation:trapPulse 2s ease-in-out infinite}
.qv{font-size:24px;font-weight:700;transition:all .3s;position:relative;z-index:1}.qv.gld{color:var(--gold)}.qv.tm{font-weight:700}
.qbg{position:absolute;inset:0;opacity:0;transition:opacity .4s;border-radius:inherit}.qc.done .qbg{opacity:1}
.qbadge{position:absolute;top:3px;right:3px;font-size:9px;z-index:2;padding:1px 5px;border-radius:4px;font-weight:800}
.qb-gold{background:rgba(246,201,14,.15);color:var(--gold)}.qb-trap{background:rgba(239,68,68,.15);color:var(--red)}.qb-dbl{background:rgba(246,201,14,.1);color:var(--gold)}

/* ═══ SCOREBOARD — PREMIUM ═══ */
.scb{display:flex;align-items:stretch;justify-content:center;gap:16px;padding:10px 6px;position:relative;z-index:1;flex-wrap:wrap}

.scc{flex:1;max-width:400px;min-width:240px;border-radius:var(--rl);transition:all .3s;position:relative;overflow:hidden;padding:0}
.sc-top{display:flex;align-items:center;gap:14px;padding:14px 18px 10px}
.sc-emo{font-size:32px}
.sc-info{display:flex;flex-direction:column;flex:1}
.sc-name{font-size:14px;font-weight:800;opacity:.6;margin-bottom:2px}
.sc-score{font-family:var(--fd);font-size:40px;font-weight:700;line-height:1;transition:all .2s}
.sc-score.pop{animation:scorePop .4s var(--eb)}

.sc-lls{display:flex;gap:6px;padding:8px 18px 12px;flex-wrap:wrap}
.ll-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;transition:all .2s;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:rgba(255,255,255,.55)}
.ll-chip .ll-icon{font-size:12px}
.ll-chip .ll-label{font-size:9px;letter-spacing:.5px}
.ll-chip.avail{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.ll-chip.avail:hover{background:rgba(255,255,255,.08);color:#fff}
.ll-chip.used{opacity:.2;background:rgba(255,255,255,.01);border-color:rgba(255,255,255,.03)}
.ll-chip.used .ll-label{text-decoration:line-through}

.sc-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 4px;align-self:center}
.sc-vs{font-family:var(--fd);font-size:16px;color:rgba(255,255,255,.06);font-weight:700;letter-spacing:4px}

/* Tooltip for lifeline explanation */
.ll-tip{position:relative}
.ll-tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(.9);opacity:0;pointer-events:none;transition:all .2s;background:#1a1e35;color:rgba(255,255,255,.8);font-size:10px;font-weight:600;padding:6px 12px;border-radius:8px;white-space:nowrap;border:1px solid rgba(255,255,255,.08);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:10}
.ll-tip:hover::after{opacity:1;transform:translateX(-50%) scale(1)}

/* Flash + bonus popup */
.flash-ov{position:fixed;inset:0;pointer-events:none;z-index:500;opacity:0;animation:flash .5s ease forwards}
.bonus-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:600;pointer-events:none;animation:bonusPop .6s var(--eb) forwards;font-family:var(--fd);font-size:42px;font-weight:700;text-shadow:0 4px 20px rgba(0,0,0,.5)}
.rand-ov{position:fixed;inset:0;background:rgba(2,4,12,.9);display:flex;align-items:center;justify-content:center;z-index:250;animation:fadeIn .2s}
.rand-spin{font-size:60px;animation:spinPick 1.5s var(--e) forwards}

/* ═══ QUESTION OVERLAY ═══ */
.qov{position:fixed;inset:0;background:rgba(2,4,12,.93);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .15s}
.qmod{width:100%;max-width:700px;border-radius:var(--rl);overflow:hidden;background:linear-gradient(170deg,#0C1024,#080C1A);border:1px solid rgba(255,255,255,.05);box-shadow:0 40px 80px rgba(0,0,0,.5);animation:scaleIn .35s var(--eb)}
.qhdr{padding:14px 22px;display:flex;align-items:center;gap:8px;font-family:var(--fd);font-size:17px;font-weight:600;position:relative}
.qhdr::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.qhpts{margin-right:auto;background:rgba(0,0,0,.3);padding:3px 14px;border-radius:10px;font-size:14px;font-weight:700;border:1px solid rgba(255,255,255,.04)}
.qh-special{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:800;margin-right:6px;animation:pulse 1s infinite}
.qh-gold{background:rgba(246,201,14,.15);color:var(--gold)}.qh-trap{background:rgba(239,68,68,.15);color:var(--red)}
.qbdy{padding:24px 22px;display:flex;flex-direction:column;align-items:center}

/* Lifeline bar in question */
.q-llbar{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;width:100%}
.q-ll-team{display:flex;flex-direction:column;gap:6px;padding:12px;border-radius:var(--r);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.q-ll-title{font-size:11px;font-weight:800;text-align:center;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.q-llbtn{font-size:12px;padding:8px 12px;border-radius:10px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s;border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:rgba(255,255,255,.6);width:100%;justify-content:center}
.q-llbtn:hover:not(:disabled){background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.q-llbtn.active{border-color:var(--gold);color:var(--gold);background:rgba(246,201,14,.06);animation:dblGlow 1.5s infinite}
.q-llbtn:disabled{opacity:.2}
.q-ll-none{font-size:11px;color:rgba(255,255,255,.15);text-align:center;padding:6px}

.tmr{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.tv{font-family:var(--fd);font-size:48px;font-weight:700;color:var(--gold);min-width:130px;text-align:center;letter-spacing:4px;font-variant-numeric:tabular-nums}.tv.on{animation:tmGlow 1.5s infinite}
.tb{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.tb:hover{background:rgba(255,255,255,.08);color:#fff}

.qtxt{font-size:24px;font-weight:700;text-align:center;line-height:1.9;margin-bottom:24px;max-width:580px}
.nws{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:24px;animation:scaleIn .4s var(--eb)}

{ty==="regular"&&<><div className="mqr"><input className="mi" placeholder="السؤال" value={q.q} onChange={e=>up(i,"q",e.target.value)}/></div><div className="mqr"><input className="mi" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
{ty==="letters"&&<><div className="mqr"><input className="mi" placeholder="السؤال" value={q.q} onChange={e=>up(i,"q",e.target.value)}/><input className="mi" placeholder="حرف" value={q.letter} onChange={e=>up(i,"letter",e.target.value)} style={{maxWidth:50,textAlign:"center",fontWeight:900}}/></div><div className="mqr"><input className="mi" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
{(ty==="no_words"||ty==="guess_photo")&&<><div className="mqr"><input className="mi" placeholder={ty==="no_words"?"مسار الصورة: No Words/image.png":"مسار الصورة: Guess/image.png"} value={q.image} onChange={e=>up(i,"image",e.target.value)}/></div><div className="mqr"><input className="mi" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
</div>)}</div>
<div className="mbtns"><button className="btn btn-gold" style={{flex:1}} disabled={!ok} onClick={()=>onSave({id:"c_"+Date.now(),name:nm,icon:ic,color:co,type:ty,questions:qs})}>💾 حفظ</button><button className="btn btn-ghost" onClick={onClose}>إلغاء</button></div></div></div>;}

function App(){
const[scr,setScr]=useState("setup");const[step,setStep]=useState(0);
const[t1,setT1]=useState({name:"",color:CLS[0],emoji:"⚡"});const[t2,setT2]=useState({name:"",color:CLS[1],emoji:"🔥"});
const[pool,setPool]=useState(CATS);const[sel,setSel]=useState([]);const[modal,setModal]=useState(false);
const[gc,setGc]=useState([]);const[ans,setAns]=useState({});
const[s1,setS1]=useState(0);const[s2,setS2]=useState(0);const[pop,setPop]=useState(0);
const[aq,setAq]=useState(null);const[sa,setSa]=useState(false);
const[e1,setE1]=useState(false);const[e2,setE2]=useState(false);
// Lifelines: true = available
const[ll,setLl]=useState({1:{dbl:true,sw:true,shield:true,steal:true},2:{dbl:true,sw:true,shield:true,steal:true}});
const[activeDbl,setActiveDbl]=useState(0); // which team activated double (0=none)
const[flash,setFlash]=useState(null);const[rand,setRand]=useState(false);
const[bonusMsg,setBonusMsg]=useState(null);
const[domBanner,setDomBanner]=useState(null);
// Special questions
const[goldenKey,setGoldenKey]=useState(null);const[trapKey,setTrapKey]=useState(null);
const[randMult,setRandMult]=useState(1); // for random picks
const tm=useTimer();
// Track correct per team per category
const[catScore,setCatScore]=useState({}); // {`${ci}-${team}`: count}

const togCat=id=>setSel(p=>{if(p.includes(id))return p.filter(c=>c!==id);return p.length>=6?p:[...p,id]});

const startGame=()=>{
  const g=pool.filter(c=>sel.includes(c.id));setGc(g);
  // Assign golden + trap randomly
  const allKeys=[];g.forEach((c,ci)=>c.questions.forEach((q,qi)=>allKeys.push(`${ci}-${qi}`)));
  const shuffled=[...allKeys].sort(()=>Math.random()-.5);
  setGoldenKey(shuffled[0]||null);setTrapKey(shuffled[1]||null);
  setScr("board");
};

const openQ=(ci,qi)=>{const k=`${ci}-${qi}`;if(ans[k])return;setAq({ci,qi,k,cat:gc[ci],q:gc[ci].questions[qi]});setSa(false);setActiveDbl(0);setRandMult(1);tm.reset();tm.toggle();setScr("question")};

const showBonus=(text,color)=>{setBonusMsg({text,color});setTimeout(()=>setBonusMsg(null),2000)};
const doFlash=(color)=>{setFlash(color);setTimeout(()=>setFlash(null),600)};

const calcPts=()=>{
  let mult=1;
  if(activeDbl)mult*=2;
  if(aq.k===goldenKey)mult*=3;
  if(randMult>1)mult*=randMult;
  return aq.q.pts*mult;
};

const award=(team)=>{
  const pts=calcPts();
  if(team===1){setS1(v=>v+pts);setPop(1)}else{setS2(v=>v+pts);setPop(2)}
  doFlash(team===1?t1.color.c:t2.color.c);
  setTimeout(()=>setPop(0),500);
  if(aq.k===goldenKey)showBonus("🌟 سؤال ذهبي! ×3","#FFD700");
  if(randMult>1)showBonus(`🎲 مضاعف عشوائي ×${randMult}`,"#C084FC");
  // Track category domination
  const csKey=`${aq.ci}-${team}`;const newCS={...catScore,[csKey]:(catScore[csKey]||0)+1};setCatScore(newCS);
  // Check domination (6 correct in a category)
  if(newCS[csKey]>=5){setDomBanner(`${team===1?t1.emoji:t2.emoji} ${team===1?t1.name:t2.name} سيطروا على ${gc[aq.ci].name}! +500`);
    if(team===1)setS1(v=>v+500);else setS2(v=>v+500);setTimeout(()=>setDomBanner(null),3000);}
  fin({team,pts});
};

// Shield: protects team from trap deduction (used before reveal)
const useShield=(team)=>{setLl(p=>({...p,[team]:{...p[team],shield:false}}));showBonus(`🛡️ ${team===1?t1.name:t2.name} — حماية من الفخ!`,"#10B981")};
// Steal: auto-awards points to team if they use it (used after reveal)
const useSteal=(team)=>{setLl(p=>({...p,[team]:{...p[team],steal:false}}));award(team);showBonus(`🏴 ${team===1?t1.name:t2.name} — سرقة!`,"#A855F7")};

const noOne=()=>{
  // Trap: show message if trap question
  if(aq.k===trapKey)showBonus("💣 سؤال فخ! محد أجاب","#EF4444");
  fin({team:0,pts:0});
};
const fin=res=>{tm.stop();setActiveDbl(0);const na={...ans,[aq.k]:res};setAns(na);Object.keys(na).length>=gc.length*6?setTimeout(()=>setScr("gameover"),400):setScr("board")};

// Lifeline: Double
const useDbl=(team)=>{setLl(p=>({...p,[team]:{...p[team],dbl:false}}));setActiveDbl(team);showBonus(`⚡ ${team===1?t1.name:t2.name} — نقاط مضاعفة!`,"#F6C90E")};
// Lifeline: Switch
const useSwitch=(team)=>{setLl(p=>({...p,[team]:{...p[team],sw:false}}));
  const open=[];gc.forEach((c,ci)=>c.questions.forEach((q,qi)=>{const k=`${ci}-${qi}`;if(!ans[k]&&k!==aq.k)open.push([ci,qi])}));
  if(!open.length)return;const[ci,qi]=open[~~(Math.random()*open.length)];
  setAq({ci,qi,k:`${ci}-${qi}`,cat:gc[ci],q:gc[ci].questions[qi]});setSa(false);tm.reset();tm.toggle();
  showBonus("🔄 تبديل السؤال!","#06B6D4");
};

const randomPick=()=>{const open=[];gc.forEach((c,ci)=>c.questions.forEach((q,qi)=>{if(!ans[`${ci}-${qi}`])open.push([ci,qi])}));if(!open.length)return;
  setRand(true);const mult=[1,1,1,1.5,1.5,2][~~(Math.random()*6)];
  setTimeout(()=>{setRand(false);const[ci,qi]=open[~~(Math.random()*open.length)];setRandMult(mult);openQ(ci,qi);if(mult>1)showBonus(`🎲 مضاعف عشوائي! ×${mult}`,"#C084FC")},1600)};

const importJSON=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const c=d.categories||d;if(Array.isArray(c))setPool(p=>[...p,...c.map((x,i)=>({...x,id:x.id||"i_"+Date.now()+"_"+i}))])}catch{alert("خطأ")}};r.readAsText(f)};inp.click()};
const resetAll=()=>{setScr("setup");setStep(0);setT1({name:"",color:CLS[0],emoji:"⚡"});setT2({name:"",color:CLS[1],emoji:"🔥"});setSel([]);setGc([]);setAns({});setS1(0);setS2(0);setAq(null);setSa(false);tm.reset();setLl({1:{dbl:true,sw:true,shield:true,steal:true},2:{dbl:true,sw:true,shield:true,steal:true}});setCatScore({})};

// ═══ SETUP ═══
if(scr==="setup")return<div className="setup"><div className="orb o1"/><div className="orb o2"/>
<div className="scard"><div className="logo"><div className="logo-m"><span className="ls">سين</span><span className="lj">جيم</span></div></div><div className="lsub">لعبة المعرفة والتحدي</div>
<div className="steps"><div className={`pip ${step===0?"on":step>0?"ok":""}`}/><div className={`pip ${step===1?"on":""}`}/></div>
{step===0?<div className="fs" key="s0"><div className="stitle">⚔️ إعداد الفريقين</div>
<div className="t-row">
<div className="tc" style={{borderColor:t1.color.c+"30"}}><div className="tlbl">الفريق الأول</div><div className="teb" style={{borderColor:t1.color.c+"50"}} onClick={()=>{setE1(!e1);setE2(false)}}>{t1.emoji}</div>{e1&&<div className="edd">{TEM.map(e=><button key={e} className={`eo ${t1.emoji===e?"sel":""}`} onClick={()=>{setT1({...t1,emoji:e});setE1(false)}}>{e}</button>)}</div>}<input className="tinp" placeholder="اسم الفريق" value={t1.name} onChange={e=>setT1({...t1,name:e.target.value})} style={{borderColor:t1.color.c+"25"}}/><div className="crow">{CLS.map(c=><div key={c.id} className={`cdot ${t1.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT1({...t1,color:c})}/>)}</div></div>
<div className="vsp">VS</div>
<div className="tc" style={{borderColor:t2.color.c+"30"}}><div className="tlbl">الفريق الثاني</div><div className="teb" style={{borderColor:t2.color.c+"50"}} onClick={()=>{setE2(!e2);setE1(false)}}>{t2.emoji}</div>{e2&&<div className="edd">{TEM.map(e=><button key={e} className={`eo ${t2.emoji===e?"sel":""}`} onClick={()=>{setT2({...t2,emoji:e});setE2(false)}}>{e}</button>)}</div>}<input className="tinp" placeholder="اسم الفريق" value={t2.name} onChange={e=>setT2({...t2,name:e.target.value})} style={{borderColor:t2.color.c+"25"}}/><div className="crow">{CLS.map(c=><div key={c.id} className={`cdot ${t2.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT2({...t2,color:c})}/>)}</div></div></div>
<button className="btn btn-gold btn-lg" disabled={!t1.name.trim()||!t2.name.trim()} onClick={()=>setStep(1)}>التالي ← التصنيفات</button>
</div>:<div className="fs" key="s1">
<button className="btn btn-ghost" style={{marginBottom:10,fontSize:12,padding:"5px 12px"}} onClick={()=>setStep(0)}>→ رجوع</button>
<div className="stitle">📚 اختر 6 تصنيفات <span style={{fontSize:13,background:"rgba(246,201,14,.08)",color:"var(--gold)",padding:"3px 12px",borderRadius:12,marginRight:8}}>{sel.length}/6</span></div>
<div className="ctls"><button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={()=>setModal(true)}>➕ إضافة</button><button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={importJSON}>📂 JSON</button></div>
<div className="cg">{pool.map(c=>{const s=sel.includes(c.id),f=sel.length>=6&&!s;const tp={regular:null,no_words:"🤫",letters:"🔤",guess_photo:"🧩"}[c.type];
return<button key={c.id} onClick={()=>!f&&togCat(c.id)} className={`cc ${s?"sel":""} ${f?"full":""}`} style={{color:c.color}}>{s&&<div className="cck" style={{background:c.color}}>✓</div>}<span className="cci">{c.icon}</span><span className="ccn">{c.name}</span>{tp&&<span className="cct">{tp}</span>}<div className="ccg" style={{background:c.color}}/></button>})}</div>
<button className="btn btn-gold btn-lg" disabled={sel.length!==6} onClick={startGame}>🎮 ابدأ!</button>
{modal&&<CatModal onClose={()=>setModal(false)} onSave={c=>{setPool(p=>[...p,c]);setModal(false)}}/>}
</div>}</div></div>;

// ═══ QUESTION ═══
if(scr==="question"&&aq){const{cat,q}=aq;const nw=cat.type==="no_words",lt=cat.type==="letters",ph=cat.type==="guess_photo";const isGolden=aq.k===goldenKey;const isTrap=aq.k===trapKey;const pts=calcPts();
return<div className="qov"><div className="qmod">
<div className="qhdr" style={{background:`linear-gradient(135deg,${cat.color},${cat.color}CC)`}}>
  <span>{cat.icon}</span><span>{cat.name}</span>
  {activeDbl>0&&<span className="qh-special qh-gold">⚡ ×2</span>}
  {randMult>1&&<span className="qh-special qh-gold">🎲 ×{randMult}</span>}
  <span className="qhpts">{sa?(isGolden?pts+" 🌟":isTrap?pts+" 💣":pts):aq.q.pts}</span>
</div>
<div className="qbdy">
  {/* Lifelines — split by team, blocked on golden/trap */}
  {!sa&&!isGolden&&!isTrap&&(ll[1].dbl||ll[1].sw||ll[1].shield||ll[2].dbl||ll[2].sw||ll[2].shield)&&<div className="q-llbar">
    <div className="q-ll-team" style={{borderColor:t1.color.c+"25"}}>
      <div className="q-ll-title" style={{color:t1.color.l}}>{t1.emoji} {t1.name}</div>
      {ll[1].dbl&&<button className={`q-llbtn ${activeDbl===1?"active":""}`} onClick={()=>useDbl(1)}>⚡ مضاعفة</button>}
      {ll[1].sw&&<button className="q-llbtn" onClick={()=>useSwitch(1)}>🔄 تبديل</button>}
      {ll[1].shield&&<button className="q-llbtn" onClick={()=>useShield(1)}>🛡️ حماية</button>}
      {!ll[1].dbl&&!ll[1].sw&&!ll[1].shield&&<div className="q-ll-none">لا توجد وسائل</div>}
    </div>
    <div className="q-ll-team" style={{borderColor:t2.color.c+"25"}}>
      <div className="q-ll-title" style={{color:t2.color.l}}>{t2.emoji} {t2.name}</div>
      {ll[2].dbl&&<button className={`q-llbtn ${activeDbl===2?"active":""}`} onClick={()=>useDbl(2)}>⚡ مضاعفة</button>}
      {ll[2].sw&&<button className="q-llbtn" onClick={()=>useSwitch(2)}>🔄 تبديل</button>}
      {ll[2].shield&&<button className="q-llbtn" onClick={()=>useShield(2)}>🛡️ حماية</button>}
      {!ll[2].dbl&&!ll[2].sw&&!ll[2].shield&&<div className="q-ll-none">لا توجد وسائل</div>}
    </div>
  </div>}

  <div className="tmr"><button className="tb" onClick={tm.toggle}>{tm.on?"⏸":"▶"}</button><div className={`tv ${tm.on?"on":""}`}>{tm.fmt}</div><button className="tb" onClick={tm.reset}>↻</button></div>

  {nw&&!sa&&<div className="qr-show">
          <div className="qr-frame"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent("https://ianasx.github.io/games/images/"+q.image)}`} alt="QR"/></div>
          <div className="qr-label">📱 امسح الكود بجوالك</div>
          <div className="qr-sublabel">اللاعب يشوف الصورة ويشرحها بدون كلام</div>
          <div className="qr-answer-hint">🤫 الجواب: {q.a}</div>
        </div>}
  {ph&&!sa&&<div className="phs"><img className="phi" src={`images/${q.image}`} alt={q.image} onError={e=>{e.target.style.background="#111";e.target.alt=q.image}}/></div>}
  {lt&&<><div className="lta"><span className="ltl">يبدأ بحرف</span><div className="ltb">{q.letter}</div></div><p className="qtxt">{q.q}</p></>}
  {!nw&&!lt&&!ph&&<p className="qtxt">{q.q}</p>}

  {!sa?<button className="btn btn-gold" style={{fontSize:19,padding:"15px 40px"}} onClick={()=>{setSa(true);tm.stop()}}>🔍 كشف الإجابة</button>
  :<div className="answ">
    <div className="ansc"><div className="ansl">الإجابة</div><p className="ansv">{q.a}</p></div>
    <div className="anst">⏱️ {tm.fmt}{activeDbl?" • ⚡ مضاعفة":""}{randMult>1?` • 🎲 ×${randMult}`:""}</div>
    {isGolden&&<div style={{textAlign:"center",marginBottom:12,animation:"bonusPop .5s var(--eb)"}}><span style={{background:"rgba(246,201,14,.12)",color:"var(--gold)",padding:"6px 18px",borderRadius:10,fontSize:15,fontWeight:800}}>🌟 سؤال ذهبي! النقاط ×3</span></div>}
    {isTrap&&<div style={{textAlign:"center",marginBottom:12,animation:"bonusPop .5s var(--eb)"}}><span style={{background:"rgba(239,68,68,.12)",color:"var(--red)",padding:"6px 18px",borderRadius:10,fontSize:15,fontWeight:800}}>💣 سؤال فخ! الخطأ يخصم نقاط</span></div>}
    <p style={{textAlign:"center",fontSize:13,color:"var(--dim)",marginBottom:12,fontWeight:600}}>من أجاب صح؟</p>
    <div className="ans-btns">
      <button className="ans-team-btn" style={{background:`linear-gradient(135deg,${t1.color.c},${t1.color.l})`,boxShadow:`0 4px 20px ${t1.color.c}30`}} onClick={()=>award(1)}>{t1.emoji} {t1.name}</button>
      <button className="ans-team-btn" style={{background:`linear-gradient(135deg,${t2.color.c},${t2.color.l})`,boxShadow:`0 4px 20px ${t2.color.c}30`}} onClick={()=>award(2)}>{t2.emoji} {t2.name}</button>
      <button className="ans-skip-btn" onClick={noOne}>لا أحد أجاب</button>
    </div>
    {!isGolden&&!isTrap&&(ll[1].steal||ll[2].steal)&&<div style={{display:"flex",gap:6,marginTop:10,justifyContent:"center"}}>
      {ll[1].steal&&<button className="q-llbtn" onClick={()=>useSteal(1)}>🏴 سرقة — {t1.emoji} {t1.name}</button>}
      {ll[2].steal&&<button className="q-llbtn" onClick={()=>useSteal(2)}>🏴 سرقة — {t2.emoji} {t2.name}</button>}
    </div>}
  </div>}
</div></div></div>;}

// ═══ GAMEOVER ═══
if(scr==="gameover"){const w=s1>s2?1:s2>s1?2:0;const wt=w===1?t1:w===2?t2:null;
return<div className="gow">{w!==0&&<Confetti/>}<div className="goc">
<div className="got">{wt?wt.emoji:"🤝"}</div>
<h1 className="goti" style={wt?{background:`linear-gradient(135deg,${wt.color.c},${wt.color.l})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}:{color:"var(--gold)"}}>{w===1?`${t1.name} فازوا!`:w===2?`${t2.name} فازوا!`:"تعادل!"}</h1>
<div className="gosub">{wt?`بفارق ${Math.abs(s1-s2)} نقطة`:"متساوية!"}</div>
<div className="gosc"><div className="goteam"><div className="goe">{t1.emoji}</div><div className="gon" style={{color:t1.color.c}}>{t1.name}</div><div className="gos" style={{color:t1.color.c}}>{s1}</div></div><div className="govs">—</div><div className="goteam"><div className="goe">{t2.emoji}</div><div className="gon" style={{color:t2.color.c}}>{t2.name}</div><div className="gos" style={{color:t2.color.c}}>{s2}</div></div></div>
<button className="btn btn-gold btn-lg" style={{maxWidth:360,margin:"0 auto"}} onClick={resetAll}>🔄 لعبة جديدة</button></div></div>;}

// ═══ BOARD ═══
const rows=[[0,1],[2,3],[4,5]];const anN=Object.keys(ans).length;const totQ=gc.length*6;
const cBg=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return null;const tc=a.team===1?t1.color.c:a.team===2?t2.color.c:null;return tc?`linear-gradient(135deg,${tc}20,${tc}08)`:"rgba(255,255,255,.015)"};
const cPts=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return{cls:"gld",sty:{}};const tc=a.team===1?t1.color.l:a.team===2?t2.color.l:"rgba(255,255,255,.08)";return{cls:"tm",sty:{color:tc}}};
const tier=p=>p<=200?"t2":p<=400?"t4":"t6";

return<div className="board"><div className="bbg"/>
{flash&&<div className="flash-ov" key={Date.now()} style={{background:flash}}/>}
{bonusMsg&&<div className="bonus-pop" key={bonusMsg.text} style={{color:bonusMsg.color}}>{bonusMsg.text}</div>}
{domBanner&&<div className="dom-banner">{domBanner}</div>}
{rand&&<div className="rand-ov"><div className="rand-spin">🎲</div></div>}

<div className="bhdr"><div className="blogo"><span className="bs">سين</span> <span className="bj">جيم</span></div><div style={{flex:1}}/><div className="bacts">
  <button className="abtn ab-r" onClick={randomPick}>🎲 عشوائي</button>
  <button className="abtn ab-e" onClick={()=>setScr("gameover")}>🏁</button>
</div></div>
<div className="prog"><div className="pbar" style={{width:`${totQ?(anN/totQ)*100:0}%`}}/></div>

<div className="bgrd">{gc.map((cat,ci)=><div key={cat.id} className="cblk" style={{animationDelay:`${ci*.07}s`}}>
  <style>{`.cblk:nth-child(${ci+1})::before{background:linear-gradient(90deg,transparent,${cat.color},transparent)}.cblk:nth-child(${ci+1}) .qc::after{background:linear-gradient(90deg,transparent,${cat.color},transparent)!important}.cblk:nth-child(${ci+1}) .qc:not(.done):hover{border-color:${cat.color}20}`}</style>

  {rows.map(([li],ri)=>{const k=`${ci}-${li}`;const d=!!ans[k];const cp=cPts(ci,li);const bg=cBg(ci,li);const pts=cat.questions[li].pts;
    return<button key={`l${ri}`} className={`qc ${tier(pts)} ${d?"done":""}`} style={{gridColumn:1,gridRow:ri+1}} onClick={()=>openQ(ci,li)} disabled={d}>
      <div className="qbg" style={{background:bg||"transparent"}}/>
      <span className={`qv ${cp.cls}`} style={cp.sty}>{pts}</span>
    </button>})}

  <div className="bmid" style={{background:cat.color+"06"}}><div className="bm-ring" style={{borderColor:cat.color+"30",background:cat.color+"0A"}}>{cat.icon}</div><span className="bm-nm">{cat.name}</span>{cat.type!=="regular"&&<span className="bm-tp">{{no_words:"تمثيل",letters:"حروف",guess_photo:"صور"}[cat.type]}</span>}</div>

  {rows.map(([,ri2],ri)=>{const k=`${ci}-${ri2}`;const d=!!ans[k];const cp=cPts(ci,ri2);const bg=cBg(ci,ri2);const pts=cat.questions[ri2].pts;
    return<button key={`r${ri}`} className={`qc ${tier(pts)} ${d?"done":""}`} style={{gridColumn:3,gridRow:ri+1}} onClick={()=>openQ(ci,ri2)} disabled={d}>
      <div className="qbg" style={{background:bg||"transparent"}}/>
      <span className={`qv ${cp.cls}`} style={cp.sty}>{pts}</span>
    </button>})}
</div>)}</div>

<div className="scb">
  {/* Team 1 */}
  <div className="scc" style={{border:`1.5px solid ${t1.color.c}35`,background:`linear-gradient(160deg,${t1.color.c}08,${t1.color.c}03)`}}>
    <div className="sc-top">
      <div className="sc-emo">{t1.emoji}</div>
      <div className="sc-info">
        <div className="sc-name" style={{color:t1.color.l}}>{t1.name}</div>
        <div className={`sc-score ${pop===1?"pop":""}`} style={{color:t1.color.c}}>{s1}</div>
      </div>
    </div>
    <div className="sc-lls">
      <div className={`ll-chip ll-tip ${ll[1].dbl?"avail":"used"}`} data-tip="نقاط مضاعفة ×2 لسؤال واحد"><span className="ll-icon">⚡</span><span className="ll-label">مضاعفة</span></div>
      <div className={`ll-chip ll-tip ${ll[1].sw?"avail":"used"}`} data-tip="استبدال السؤال بسؤال آخر عشوائي"><span className="ll-icon">🔄</span><span className="ll-label">تبديل</span></div>
      <div className={`ll-chip ll-tip ${ll[1].shield?"avail":"used"}`} data-tip="حماية من خصم النقاط عند الخطأ"><span className="ll-icon">🛡️</span><span className="ll-label">حماية</span></div>
      <div className={`ll-chip ll-tip ${ll[1].steal?"avail":"used"}`} data-tip="سرقة السؤال إذا أخطأ الفريق الآخر"><span className="ll-icon">🏴</span><span className="ll-label">سرقة</span></div>
    </div>
  </div>

  <div className="sc-divider"><div className="sc-vs">VS</div></div>

  {/* Team 2 */}
  <div className="scc" style={{border:`1.5px solid ${t2.color.c}35`,background:`linear-gradient(160deg,${t2.color.c}08,${t2.color.c}03)`}}>
    <div className="sc-top">
      <div className="sc-emo">{t2.emoji}</div>
      <div className="sc-info">
        <div className="sc-name" style={{color:t2.color.l}}>{t2.name}</div>
        <div className={`sc-score ${pop===2?"pop":""}`} style={{color:t2.color.c}}>{s2}</div>
      </div>
    </div>
    <div className="sc-lls">
      <div className={`ll-chip ll-tip ${ll[2].dbl?"avail":"used"}`} data-tip="نقاط مضاعفة ×2 لسؤال واحد"><span className="ll-icon">⚡</span><span className="ll-label">مضاعفة</span></div>
      <div className={`ll-chip ll-tip ${ll[2].sw?"avail":"used"}`} data-tip="استبدال السؤال بسؤال آخر عشوائي"><span className="ll-icon">🔄</span><span className="ll-label">تبديل</span></div>
      <div className={`ll-chip ll-tip ${ll[2].shield?"avail":"used"}`} data-tip="حماية من خصم النقاط عند الخطأ"><span className="ll-icon">🛡️</span><span className="ll-label">حماية</span></div>
      <div className={`ll-chip ll-tip ${ll[2].steal?"avail":"used"}`} data-tip="سرقة السؤال إذا أخطأ الفريق الآخر"><span className="ll-icon">🏴</span><span className="ll-label">سرقة</span></div>
    </div>
  </div>
</div></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
