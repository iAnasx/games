<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>سين جيم — لعبة المعرفة والتحدي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060F;--surface:rgba(255,255,255,0.03);
  --gold:#F6C90E;--gold2:#D4A90A;--neon:#00D4FF;
  --green:#10B981;--red:#EF4444;
  --txt:#E8ECF1;--dim:rgba(255,255,255,0.3);
  --r:14px;--r-lg:22px;
  --fd:'Readex Pro',sans-serif;--fb:'Tajawal',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--bounce:cubic-bezier(.34,1.56,.64,1);
}
html,body,#root{min-height:100vh;overflow-x:hidden}
body{font-family:var(--fb);direction:rtl;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
input,textarea,select{font-family:var(--fb)}
input::placeholder{color:rgba(255,255,255,0.2)}
input:focus,select:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(246,201,14,0.08)}
button{font-family:var(--fb);cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
button:disabled{opacity:.25;cursor:not-allowed}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes orbMove{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-30px)}66%{transform:translate(-15px,20px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 10px rgba(246,201,14,.2)}50%{text-shadow:0 0 35px rgba(246,201,14,.5)}}
@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes letterBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-5px) rotate(1deg)}}
@keyframes cellIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes neonBorder{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes spinPick{0%{transform:rotate(0)}100%{transform:rotate(1080deg)}}
@keyframes doubleGlow{0%,100%{box-shadow:0 0 15px rgba(246,201,14,.2)}50%{box-shadow:0 0 40px rgba(246,201,14,.4)}}

/* ═══ BUTTONS ═══ */
.btn{font-weight:700;font-size:15px;padding:12px 24px;border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .25s var(--ease);line-height:1.3}
.btn:not(:disabled):hover{transform:translateY(-2px)}
.btn:not(:disabled):active{transform:scale(.96)!important}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0a0a;font-weight:800;box-shadow:0 4px 20px rgba(246,201,14,.15)}
.btn-gold:not(:disabled):hover{box-shadow:0 8px 32px rgba(246,201,14,.25)}
.btn-lg{width:100%;font-size:18px;padding:16px 32px;border-radius:var(--r-lg)}
.btn-ghost{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06)}

/* ═══ SETUP ═══ */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;overflow:hidden}
.setup::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(246,201,14,.03),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(0,212,255,.02),transparent 50%)}
.orb{position:absolute;border-radius:50%;pointer-events:none;will-change:transform;filter:blur(80px)}
.orb-1{width:500px;height:500px;background:rgba(246,201,14,.05);top:-15%;right:-10%;animation:orbMove 20s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:rgba(0,212,255,.04);bottom:-10%;left:-8%;animation:orbMove 25s ease-in-out infinite 5s}

.setup-card{position:relative;z-index:1;width:100%;max-width:880px;background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(255,255,255,.008));backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.04);border-radius:28px;padding:48px 40px;animation:fadeUp .6s var(--ease)}
.logo{text-align:center;margin-bottom:6px}
.logo-main{font-family:var(--fd);font-size:68px;font-weight:700;letter-spacing:2px}
.l-sin{background:linear-gradient(135deg,var(--gold),#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.l-jim{background:linear-gradient(135deg,#FF6B6B,#E63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:16px}
.logo-sub{font-size:15px;color:var(--dim);text-align:center;margin-bottom:40px;letter-spacing:2px}
.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px}
.pip{height:4px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .4s;width:24px}
.pip.on{background:var(--gold);width:48px;box-shadow:0 0 12px rgba(246,201,14,.2)}
.pip.ok{background:var(--green)}
.step-t{font-family:var(--fd);font-size:21px;font-weight:600;text-align:center;margin-bottom:24px}
.fade-s{animation:fadeUp .3s var(--ease)}

/* Teams */
.t-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center}
.t-card{flex:1;min-width:280px;max-width:400px;background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--r-lg);padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px}
.t-label{font-size:11px;font-weight:800;letter-spacing:3px;color:var(--dim)}
.t-emoji-btn{font-size:36px;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.08);transition:all .2s}
.t-emoji-btn:hover{border-color:rgba(255,255,255,.2)}
.emoji-dd{background:#10142A;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-width:300px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fadeUp .15s}
.e-opt{font-size:20px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;transition:all .1s;border:2px solid transparent}
.e-opt:hover{background:rgba(255,255,255,.08)}
.e-opt.sel{background:rgba(246,201,14,.1);border-color:var(--gold)}
.t-inp{width:100%;padding:11px 16px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#fff;font-size:17px;text-align:center;font-weight:700;transition:all .25s}
.c-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.c-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;border:2.5px solid transparent}
.c-dot:hover{transform:scale(1.15)}
.c-dot.sel{border-color:rgba(255,255,255,.9);box-shadow:0 0 14px currentColor}
.vs-p{font-family:var(--fd);font-size:18px;color:rgba(255,255,255,.06);align-self:center;letter-spacing:8px}

/* Categories */
.cat-tools{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:24px;max-height:360px;overflow-y:auto;padding:2px}
.cc{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 6px 10px;border-radius:var(--r);border:1.5px solid transparent;color:#fff;transition:all .2s;background:var(--surface);cursor:pointer;overflow:hidden}
.cc:hover:not(.full){background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.cc.sel{border-color:currentColor;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
.cc.full:not(.sel){opacity:.15;pointer-events:none}
.cc-ic{font-size:28px;z-index:1}.cc-nm{font-size:12px;font-weight:800;text-align:center;z-index:1;line-height:1.3}
.cc-tp{font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);z-index:1}
.cc-chk{position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;z-index:2}
.cc-glow{position:absolute;bottom:-20px;width:80px;height:40px;border-radius:50%;filter:blur(20px);opacity:0;transition:opacity .3s}
.cc.sel .cc-glow{opacity:.3}

/* ═══════════════════════════════════════
   BOARD — THE PREMIUM EXPERIENCE
   ═══════════════════════════════════════ */
.board{min-height:100vh;display:flex;flex-direction:column;position:relative;padding:0 14px 14px;background:#04060F}

/* Animated background grid */
.board-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.board-bg::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 40% at 50% 0%,rgba(246,201,14,.02),transparent),
  radial-gradient(ellipse 30% 50% at 0% 50%,rgba(0,212,255,.015),transparent),
  radial-gradient(ellipse 30% 50% at 100% 50%,rgba(168,85,247,.01),transparent)}
.board-bg::after{content:'';position:absolute;inset:0;background-image:
  linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:60px 60px;animation:fadeIn 1s}

/* Floating sparkles */
.sparkle{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;opacity:0;will-change:transform}

.board-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 4px;gap:8px;position:relative;z-index:1}
.b-logo{font-family:var(--fd);font-size:22px;font-weight:700}
.b-logo .bs{background:linear-gradient(135deg,var(--gold),#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.b-logo .bj{background:linear-gradient(135deg,#FF6B6B,#E63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.board-actions{display:flex;gap:6px;align-items:center}
.action-btn{font-size:12px;padding:6px 12px;border-radius:8px;font-weight:700;display:flex;align-items:center;gap:4px;transition:all .2s}
.action-btn:hover{transform:translateY(-1px)}
.ab-random{background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(168,85,247,.05));color:#C084FC;border:1px solid rgba(168,85,247,.2)}
.ab-double{background:linear-gradient(135deg,rgba(246,201,14,.15),rgba(246,201,14,.05));color:var(--gold);border:1px solid rgba(246,201,14,.2)}
.ab-double.active{animation:doubleGlow 1.5s ease-in-out infinite;background:linear-gradient(135deg,rgba(246,201,14,.25),rgba(246,201,14,.1))}
.ab-end{background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.06)}

.progress{height:2px;background:rgba(255,255,255,.03);border-radius:2px;margin:0 4px 12px;overflow:hidden;position:relative;z-index:1}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--neon));border-radius:2px;transition:width .6s var(--ease)}

/* Board Grid */
.b-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;position:relative;z-index:1}
@media(max-width:920px){.b-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.b-grid{grid-template-columns:1fr}}

/* Category Block — THE KEY VISUAL */
.cat-blk{border-radius:var(--r-lg);overflow:hidden;display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:repeat(3,1fr);min-height:210px;position:relative;animation:cellIn .4s var(--bounce) both;
  background:linear-gradient(160deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.008) 100%);
  border:1px solid rgba(255,255,255,.05)}

/* Colored top edge glow */
.cat-blk::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;border-radius:0 0 4px 4px;opacity:.6}

/* Subtle corner accent */
.cat-blk::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 var(--r-lg) 0 80px;opacity:.04}

/* Center column */
.blk-c{grid-column:2;grid-row:1/4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 18px;gap:6px;min-width:90px;position:relative;z-index:1}
.blk-c::before,.blk-c::after{content:'';position:absolute;top:8%;bottom:8%;width:1px}
.blk-c::before{right:0;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent)}
.blk-c::after{left:0;background:linear-gradient(180deg,transparent,rgba(255,255,255,.05),transparent)}

/* Icon with glow ring */
.blk-c-ring{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;border:2px solid rgba(255,255,255,.06);transition:all .3s}
.blk-c-ring::after{content:'';position:absolute;inset:-4px;border-radius:50%;opacity:.15}
.blk-c-nm{font-family:var(--fd);font-size:11px;font-weight:600;text-align:center;line-height:1.2;max-width:80px;color:rgba(255,255,255,.55)}
.blk-c-tp{font-size:7px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.25);font-weight:700}

/* ═══ QUESTION TILES — premium solid design ═══ */
.qcell{display:flex;align-items:center;justify-content:center;padding:18px 4px;color:#fff;font-family:var(--fd);transition:all .3s var(--ease);position:relative;overflow:hidden;border-radius:10px;margin:4px;cursor:pointer;
  background:linear-gradient(145deg,#0F1328 0%,#0A0E20 50%,#080B1A 100%);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03)}

/* Subtle inner top highlight */
.qcell::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transition:all .3s}
/* Bottom edge glow (colored per category, set via inline style) */
.qcell::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;border-radius:2px;opacity:.2;transition:all .3s}

/* 200 tier — cool / subtle */
.qcell.tier-200{background:linear-gradient(145deg,#0D1225 0%,#0B0F1F 100%);border-color:rgba(100,160,255,.08)}
.qcell.tier-200::after{background:linear-gradient(90deg,transparent,rgba(100,160,255,.5),transparent)}

/* 400 tier — warm / medium */
.qcell.tier-400{background:linear-gradient(145deg,#12102A 0%,#0E0C22 100%);border-color:rgba(168,85,247,.08)}
.qcell.tier-400::after{background:linear-gradient(90deg,transparent,rgba(168,85,247,.5),transparent)}

/* 600 tier — gold / premium */
.qcell.tier-600{background:linear-gradient(145deg,#1A1508 0%,#141005 100%);border-color:rgba(246,201,14,.1)}
.qcell.tier-600::after{background:linear-gradient(90deg,transparent,rgba(246,201,14,.5),transparent)}
.qcell.tier-600 .qcell-v.gold{filter:drop-shadow(0 0 6px rgba(246,201,14,.2))}

/* Hover states */
.qcell:not(.done):hover{transform:translateY(-2px);border-color:rgba(255,255,255,.12);box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}
.qcell:not(.done):hover::before{left:5%;right:5%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.qcell:not(.done):hover::after{opacity:.6;left:10%;right:10%}
.qcell:not(.done):hover .qcell-v{transform:scale(1.15);text-shadow:0 0 20px currentColor}

/* Hover tier-specific intensity */
.qcell.tier-200:not(.done):hover{border-color:rgba(100,160,255,.15);box-shadow:0 6px 20px rgba(100,160,255,.06),inset 0 1px 0 rgba(100,160,255,.04)}
.qcell.tier-400:not(.done):hover{border-color:rgba(168,85,247,.15);box-shadow:0 6px 20px rgba(168,85,247,.06),inset 0 1px 0 rgba(168,85,247,.04)}
.qcell.tier-600:not(.done):hover{border-color:rgba(246,201,14,.2);box-shadow:0 6px 24px rgba(246,201,14,.08),inset 0 1px 0 rgba(246,201,14,.05)}

/* Active press */
.qcell:not(.done):active{transform:scale(.95)!important;box-shadow:0 1px 4px rgba(0,0,0,.5)}

/* Done state */
.qcell.done{cursor:default;transform:none;border-color:transparent}
.qcell.done::before,.qcell.done::after{opacity:0}

/* Point value */
.qcell-v{font-size:24px;font-weight:700;transition:all .3s var(--ease);position:relative;z-index:1}
.qcell-v.gold{color:var(--gold)}
.qcell-v.team{font-weight:700}

/* Answered cell colored bg */
.qcell-bg{position:absolute;inset:0;opacity:0;transition:opacity .4s;border-radius:inherit}
.qcell.done .qcell-bg{opacity:1}

/* Double indicator */
.double-badge{position:absolute;top:2px;right:2px;font-size:8px;font-weight:900;color:var(--gold);background:rgba(246,201,14,.1);padding:1px 4px;border-radius:4px;z-index:2}

/* ═══ SCOREBOARD ═══ */
.scoreboard{display:flex;align-items:stretch;justify-content:center;gap:14px;padding:10px 0;position:relative;z-index:1}

.sc-card{display:flex;align-items:center;gap:14px;padding:14px 24px;border-radius:var(--r-lg);transition:all .3s var(--ease);min-width:180px;position:relative;overflow:hidden}
/* Glass bg */
.sc-card::before{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.04}
/* Bottom glow */
.sc-card::after{content:'';position:absolute;bottom:-10px;left:20%;right:20%;height:20px;border-radius:50%;filter:blur(12px);opacity:0;transition:opacity .3s}
.sc-card.glow::after{opacity:.3}

.sc-e{font-size:28px;position:relative;z-index:1}
.sc-i{display:flex;flex-direction:column;position:relative;z-index:1}
.sc-n{font-size:13px;font-weight:700;opacity:.5}
.sc-v{font-family:var(--fd);font-size:36px;font-weight:700;line-height:1;transition:all .2s}
.sc-v.pop{animation:scorePop .4s var(--bounce)}
.sc-mid{font-family:var(--fd);font-size:14px;color:rgba(255,255,255,.04);font-weight:700;align-self:center;letter-spacing:4px}

/* Flash overlay */
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:500;opacity:0;animation:flash .5s ease forwards}

/* ═══ QUESTION OVERLAY ═══ */
.q-ov{position:fixed;inset:0;background:rgba(2,4,12,.93);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .15s}
.q-modal{width:100%;max-width:680px;border-radius:var(--r-lg);overflow:hidden;background:linear-gradient(170deg,#0C1024,#080C1A);border:1px solid rgba(255,255,255,.05);box-shadow:0 40px 80px rgba(0,0,0,.5);animation:scaleIn .35s var(--bounce)}
.q-hdr{padding:16px 24px;display:flex;align-items:center;gap:10px;font-family:var(--fd);font-size:18px;font-weight:600;position:relative}
.q-hdr::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.q-hdr-pts{margin-right:auto;background:rgba(0,0,0,.3);padding:4px 16px;border-radius:10px;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.04)}
.q-hdr-2x{font-size:11px;background:rgba(246,201,14,.15);color:var(--gold);padding:3px 10px;border-radius:8px;font-weight:800;margin-right:6px;animation:pulse 1s ease-in-out infinite}
.q-body{padding:28px 24px;display:flex;flex-direction:column;align-items:center}

/* Timer */
.tmr{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.tmr-v{font-family:var(--fd);font-size:48px;font-weight:700;color:var(--gold);min-width:130px;text-align:center;letter-spacing:4px;font-variant-numeric:tabular-nums}
.tmr-v.on{animation:timerGlow 1.5s ease-in-out infinite}
.tmr-b{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.tmr-b:hover{background:rgba(255,255,255,.08);color:#fff}

.q-text{font-size:24px;font-weight:700;text-align:center;line-height:1.9;margin-bottom:28px;max-width:580px}

/* Special */
.nw-show{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px;animation:scaleIn .4s var(--bounce)}
.nw-img{width:300px;height:300px;object-fit:contain;border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.06);background:#0a0a15}

.ans-w{width:100%;animation:reveal .35s var(--ease)}

.go-w::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(246,201,14,.03),transparent 60%)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;animation:fadeIn .15s}

.rand-ov{position:fixed;inset:0;background:rgba(2,4,12,.9);display:flex;align-items:center;justify-content:center;z-index:250;animation:fadeIn .2s}

}

      {(ty==="regular")&&<><div className="m-qr"><input className="m-inp" placeholder="السؤال" value={q.q} onChange={e=>up(i,"q",e.target.value)}/></div><div className="m-qr"><input className="m-inp" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
      {ty==="letters"&&<><div className="m-qr"><input className="m-inp" placeholder="السؤال" value={q.q} onChange={e=>up(i,"q",e.target.value)}/><input className="m-inp" placeholder="حرف" value={q.letter} onChange={e=>up(i,"letter",e.target.value)} style={{maxWidth:50,textAlign:"center",fontWeight:900}}/></div><div className="m-qr"><input className="m-inp" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
      {(ty==="no_words"||ty==="guess_photo")&&<><div className="m-qr"><input className="m-inp" placeholder="مسار الصورة" value={q.image} onChange={e=>up(i,"image",e.target.value)}/></div><div className="m-qr"><input className="m-inp" placeholder="الجواب" value={q.a} onChange={e=>up(i,"a",e.target.value)}/></div></>}
    </div>)}</div>
    <div className="m-btns"><button className="btn btn-gold" style={{flex:1}} disabled={!ok} onClick={()=>onSave({id:"c_"+Date.now(),name:nm,icon:ic,color:co,type:ty,questions:qs})}>💾 حفظ</button><button className="btn btn-ghost" onClick={onClose}>إلغاء</button></div>
  </div></div>;}

function App(){
  const[scr,setScr]=useState("setup");const[step,setStep]=useState(0);
  const[t1,setT1]=useState({name:"",color:COLORS[0],emoji:"⚡"});
  const[t2,setT2]=useState({name:"",color:COLORS[1],emoji:"🔥"});
  const[pool,setPool]=useState(CATS);const[sel,setSel]=useState([]);const[modal,setModal]=useState(false);
  const[gc,setGc]=useState([]);const[ans,setAns]=useState({});
  const[s1,setS1]=useState(0);const[s2,setS2]=useState(0);const[pop,setPop]=useState(0);
  const[aq,setAq]=useState(null);const[sa,setSa]=useState(false);
  const[e1,setE1]=useState(false);const[e2,setE2]=useState(false);
  const[dbl,setDbl]=useState(false); // double points
  const[flash,setFlash]=useState(null); // flash color
  const[rand,setRand]=useState(false); // random picker
  const tm=useTimer();

  const togCat=id=>setSel(p=>{if(p.includes(id))return p.filter(c=>c!==id);return p.length>=6?p:[...p,id]});
  const startGame=()=>{setGc(pool.filter(c=>sel.includes(c.id)));setScr("board")};

  const openQ=(ci,qi)=>{const k=`${ci}-${qi}`;if(ans[k])return;setAq({ci,qi,k,cat:gc[ci],q:gc[ci].questions[qi]});setSa(false);tm.reset();tm.toggle();setScr("question")};

  const award=(team)=>{
    const mult=dbl?2:1;const pts=aq.q.pts*mult;
    if(team===1){setS1(v=>v+pts);setPop(1);setFlash(t1.color.c)}
    else{setS2(v=>v+pts);setPop(2);setFlash(t2.color.c)}
    setTimeout(()=>{setPop(0);setFlash(null)},600);
    fin({team,pts});
  };
  const noOne=()=>{fin({team:0,pts:0})};
  const fin=res=>{tm.stop();const na={...ans,[aq.k]:res};setAns(na);Object.keys(na).length>=gc.length*6?setTimeout(()=>setScr("gameover"),400):setScr("board")};

  const randomPick=()=>{
    const open=[];gc.forEach((c,ci)=>c.questions.forEach((q,qi)=>{if(!ans[`${ci}-${qi}`])open.push([ci,qi])}));
    if(!open.length)return;
    setRand(true);
    setTimeout(()=>{setRand(false);const[ci,qi]=open[~~(Math.random()*open.length)];openQ(ci,qi)},1600);
  };

  const importJSON=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const c=d.categories||d;if(Array.isArray(c))setPool(p=>[...p,...c.map((x,i)=>({...x,id:x.id||"i_"+Date.now()+"_"+i}))])}catch{alert("خطأ")}};r.readAsText(f)};inp.click()};
  const resetAll=()=>{setScr("setup");setStep(0);setT1({name:"",color:COLORS[0],emoji:"⚡"});setT2({name:"",color:COLORS[1],emoji:"🔥"});setSel([]);setGc([]);setAns({});setS1(0);setS2(0);setAq(null);setSa(false);tm.reset();setDbl(false)};

  // ═══ SETUP ═══
  if(scr==="setup")return<div className="setup"><div className="orb orb-1"/><div className="orb orb-2"/>
    <div className="setup-card">
      <div className="logo"><div className="logo-main"><span className="l-sin">سين</span><span className="l-jim">جيم</span></div></div>
      <div className="logo-sub">لعبة المعرفة والتحدي</div>
      <div className="steps"><div className={`pip ${step===0?"on":step>0?"ok":""}`}/><div className={`pip ${step===1?"on":""}`}/></div>
      {step===0?<div className="fade-s" key="s0">
        <div className="step-t">⚔️ إعداد الفريقين</div>
        <div className="t-row">
          <div className="t-card" style={{borderColor:t1.color.c+"30"}}><div className="t-label">الفريق الأول</div>
            <div className="t-emoji-btn" style={{borderColor:t1.color.c+"50",background:t1.color.c+"0A"}} onClick={()=>{setE1(!e1);setE2(false)}}>{t1.emoji}</div>
            {e1&&<div className="emoji-dd">{TEMOJI.map(e=><button key={e} className={`e-opt ${t1.emoji===e?"sel":""}`} onClick={()=>{setT1({...t1,emoji:e});setE1(false)}}>{e}</button>)}</div>}
            <input className="t-inp" placeholder="اسم الفريق" value={t1.name} onChange={e=>setT1({...t1,name:e.target.value})} style={{borderColor:t1.color.c+"25"}}/>
            <div className="c-row">{COLORS.map(c=><div key={c.id} className={`c-dot ${t1.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT1({...t1,color:c})}/>)}</div>
          </div>
          <div className="vs-p">VS</div>
          <div className="t-card" style={{borderColor:t2.color.c+"30"}}><div className="t-label">الفريق الثاني</div>
            <div className="t-emoji-btn" style={{borderColor:t2.color.c+"50",background:t2.color.c+"0A"}} onClick={()=>{setE2(!e2);setE1(false)}}>{t2.emoji}</div>
            {e2&&<div className="emoji-dd">{TEMOJI.map(e=><button key={e} className={`e-opt ${t2.emoji===e?"sel":""}`} onClick={()=>{setT2({...t2,emoji:e});setE2(false)}}>{e}</button>)}</div>}
            <input className="t-inp" placeholder="اسم الفريق" value={t2.name} onChange={e=>setT2({...t2,name:e.target.value})} style={{borderColor:t2.color.c+"25"}}/>
            <div className="c-row">{COLORS.map(c=><div key={c.id} className={`c-dot ${t2.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT2({...t2,color:c})}/>)}</div>
          </div>
        </div>
        <button className="btn btn-gold btn-lg" disabled={!t1.name.trim()||!t2.name.trim()} onClick={()=>setStep(1)}>التالي ← التصنيفات</button>
      </div>:<div className="fade-s" key="s1">
        <button className="btn btn-ghost" style={{marginBottom:10,fontSize:12,padding:"5px 12px"}} onClick={()=>setStep(0)}>→ رجوع</button>
        <div className="step-t">📚 اختر 6 تصنيفات <span style={{fontSize:13,background:"rgba(246,201,14,.08)",color:"var(--gold)",padding:"3px 12px",borderRadius:12,marginRight:8}}>{sel.length}/6</span></div>
        <div className="cat-tools"><button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={()=>setModal(true)}>➕ إضافة</button><button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={importJSON}>📂 JSON</button></div>
        <div className="cat-grid">{pool.map(c=>{const s=sel.includes(c.id),f=sel.length>=6&&!s;const tp={regular:null,no_words:"🤫 تمثيل",letters:"🔤 حروف",guess_photo:"🧩 صور"}[c.type];
          return<button key={c.id} onClick={()=>!f&&togCat(c.id)} className={`cc ${s?"sel":""} ${f?"full":""}`} style={{color:c.color}}>
            {s&&<div className="cc-chk" style={{background:c.color}}>✓</div>}
            <span className="cc-ic">{c.icon}</span><span className="cc-nm">{c.name}</span>{tp&&<span className="cc-tp">{tp}</span>}<div className="cc-glow" style={{background:c.color}}/></button>})}</div>
        <button className="btn btn-gold btn-lg" disabled={sel.length!==6} onClick={startGame}>🎮 ابدأ!</button>
        {modal&&<CatModal onClose={()=>setModal(false)} onSave={c=>{setPool(p=>[...p,c]);setModal(false)}}/>}
      </div>}
    </div>
  </div>;

  // ═══ QUESTION ═══
  if(scr==="question"&&aq){const{cat,q}=aq;const nw=cat.type==="no_words",lt=cat.type==="letters",ph=cat.type==="guess_photo";const mult=dbl?2:1;
    return<div className="q-ov"><div className="q-modal">
      <div className="q-hdr" style={{background:`linear-gradient(135deg,${cat.color},${cat.color}CC)`}}>
        <span>{cat.icon}</span><span>{cat.name}</span>
        {dbl&&<span className="q-hdr-2x">×2</span>}
        <span className="q-hdr-pts">{q.pts*mult}</span>
      </div>
      <div className="q-body">
        <div className="tmr"><button className="tmr-b" onClick={tm.toggle}>{tm.on?"⏸":"▶"}</button><div className={`tmr-v ${tm.on?"on":""}`}>{tm.fmt}</div><button className="tmr-b" onClick={tm.reset}>↻</button></div>
        {nw&&!sa&&<div className="nw-show"><img className="nw-img" src={`images/${q.image}`} alt="" onError={e=>{e.target.style.background="#111";e.target.style.padding="40px";e.target.alt=q.image}}/><div className="nw-note">🤫 اعرض للاعب — يشرح بلا كلام!</div></div>}
        {ph&&!sa&&<div className="ph-show"><img className="ph-img" src={`images/${q.image}`} alt="" onError={e=>{e.target.style.background="#111";e.target.style.padding="40px";e.target.alt=q.image}}/></div>}
        {lt&&<><div className="lt-area"><span className="lt-lbl">يبدأ بحرف</span><div className="lt-badge">{q.letter}</div></div><p className="q-text">{q.q}</p></>}
        {!nw&&!lt&&!ph&&<p className="q-text">{q.q}</p>}
        {!sa?<button className="btn btn-gold" style={{fontSize:19,padding:"15px 40px"}} onClick={()=>{setSa(true);tm.stop()}}>🔍 كشف الإجابة</button>
        :<div className="ans-w"><div className="ans-card"><div className="ans-lbl">الإجابة</div><p className="ans-val">{q.a}</p></div>
          <div className="ans-time">⏱️ {tm.fmt}{dbl?" • نقاط مضاعفة ×2":""}</div>
          <div className="team-btns">
            <button className="btn-award" style={{background:`linear-gradient(135deg,${t1.color.c},${t1.color.l})`}} onClick={()=>award(1)}>✓ {t1.emoji} {t1.name}</button>
            <button className="btn-award" style={{background:`linear-gradient(135deg,${t2.color.c},${t2.color.l})`}} onClick={()=>award(2)}>✓ {t2.emoji} {t2.name}</button>
            <button className="btn btn-nobody" onClick={noOne}>لا أحد</button>
          </div></div>}
      </div>
    </div></div>;}

  // ═══ GAMEOVER ═══
  if(scr==="gameover"){const w=s1>s2?1:s2>s1?2:0;const wt=w===1?t1:w===2?t2:null;
    return<div className="go-w">{w!==0&&<Confetti/>}<div className="go-card">
      <div className="go-trophy">{wt?wt.emoji:"🤝"}</div>
      <h1 className="go-title" style={wt?{background:`linear-gradient(135deg,${wt.color.c},${wt.color.l})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}:{color:"var(--gold)"}}>{w===1?`${t1.name} فازوا!`:w===2?`${t2.name} فازوا!`:"تعادل!"}</h1>
      <div className="go-sub">{wt?`بفارق ${Math.abs(s1-s2)} نقطة`:"متساوية!"}</div>
      <div className="go-scores"><div className="go-team"><div className="go-e">{t1.emoji}</div><div className="go-n" style={{color:t1.color.c}}>{t1.name}</div><div className="go-s" style={{color:t1.color.c}}>{s1}</div></div><div className="go-vs">—</div><div className="go-team"><div className="go-e">{t2.emoji}</div><div className="go-n" style={{color:t2.color.c}}>{t2.name}</div><div className="go-s" style={{color:t2.color.c}}>{s2}</div></div></div>
      <button className="btn btn-gold btn-lg" style={{maxWidth:360,margin:"0 auto"}} onClick={resetAll}>🔄 لعبة جديدة</button>
    </div></div>;}

  // ═══ BOARD ═══
  const rows=[[0,1],[2,3],[4,5]];const anN=Object.keys(ans).length;const totQ=gc.length*6;
  const cStyle=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return{};const tc=a.team===1?t1.color:a.team===2?t2.color:null;return tc?{}:{}};
  const cBg=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return null;const tc=a.team===1?t1.color.c:a.team===2?t2.color.c:null;if(tc)return`linear-gradient(135deg,${tc}20,${tc}08)`;return"rgba(255,255,255,.015)"};
  const cPts=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return{cls:"gold",sty:{}};const tc=a.team===1?t1.color.l:a.team===2?t2.color.l:"rgba(255,255,255,.08)";return{cls:"team",sty:{color:tc}}};

  return<div className="board">
    <div className="board-bg"/>
    {flash&&<div className="flash-overlay" key={Date.now()} style={{background:flash}}/>}
    {rand&&<div className="rand-ov"><div className="rand-spin">🎲</div></div>}

    <div className="board-hdr">
      <div className="b-logo"><span className="bs">سين</span> <span className="bj">جيم</span></div>
      <div style={{flex:1}}/>
      <div className="board-actions">
        <button className="action-btn ab-random" onClick={randomPick}>🎲 عشوائي</button>
        <button className={`action-btn ab-double ${dbl?"active":""}`} onClick={()=>setDbl(!dbl)}>{dbl?"⚡ ×2 مفعّل":"⚡ مضاعفة"}</button>
        <button className="action-btn ab-end" onClick={()=>setScr("gameover")}>🏁</button>
      </div>
    </div>
    <div className="progress"><div className="progress-bar" style={{width:`${totQ?(anN/totQ)*100:0}%`}}/></div>

    <div className="b-grid">
      {gc.map((cat,ci)=><div key={cat.id} className="cat-blk" style={{animationDelay:`${ci*.07}s`,"--cc":cat.color}}>
        <style>{`
          .cat-blk:nth-child(${ci+1})::before{background:linear-gradient(90deg,transparent,${cat.color},transparent)}
          .cat-blk:nth-child(${ci+1})::after{background:${cat.color}}
          .cat-blk:nth-child(${ci+1}) .blk-c-ring{border-color:${cat.color}30}
          .cat-blk:nth-child(${ci+1}) .blk-c-ring::after{border:2px solid ${cat.color}20}
          .cat-blk:nth-child(${ci+1}) .qcell::after{background:linear-gradient(90deg,transparent,${cat.color},transparent)!important}
          .cat-blk:nth-child(${ci+1}) .qcell:not(.done):hover{border-color:${cat.color}25;box-shadow:0 6px 24px ${cat.color}0A,inset 0 1px 0 ${cat.color}08}
        `}</style>

        {rows.map(([li],ri)=>{const k=`${ci}-${li}`;const d=!!ans[k];const cp=cPts(ci,li);const bg=cBg(ci,li);const pts=cat.questions[li].pts;
          return<button key={`l${ri}`} className={`qcell tier-${pts} ${d?"done":""}`} style={{gridColumn:1,gridRow:ri+1}} onClick={()=>openQ(ci,li)} disabled={d}>
            <div className="qcell-bg" style={{background:bg||"transparent"}}/>
            {dbl&&!d&&<span className="double-badge">×2</span>}
            <span className={`qcell-v ${cp.cls}`} style={cp.sty}>{pts}</span>
          </button>})}

        <div className="blk-c" style={{background:cat.color+"06"}}>
          <div className="blk-c-ring" style={{background:cat.color+"0A"}}>{cat.icon}</div>
          <span className="blk-c-nm">{cat.name}</span>
          {cat.type!=="regular"&&<span className="blk-c-tp">{{no_words:"تمثيل",letters:"حروف",guess_photo:"صور"}[cat.type]}</span>}
        </div>

        {rows.map(([,ri2],ri)=>{const k=`${ci}-${ri2}`;const d=!!ans[k];const cp=cPts(ci,ri2);const bg=cBg(ci,ri2);const pts=cat.questions[ri2].pts;
          return<button key={`r${ri}`} className={`qcell tier-${pts} ${d?"done":""}`} style={{gridColumn:3,gridRow:ri+1}} onClick={()=>openQ(ci,ri2)} disabled={d}>
            <div className="qcell-bg" style={{background:bg||"transparent"}}/>
            {dbl&&!d&&<span className="double-badge">×2</span>}
            <span className={`qcell-v ${cp.cls}`} style={cp.sty}>{pts}</span>
          </button>})}
      </div>)}
    </div>

    <div className="scoreboard">
      <div className="sc-card" style={{borderColor:t1.color.c+"40",background:t1.color.c+"06"}}><div className="sc-card" style={{position:"absolute",inset:0,background:t1.color.c,opacity:.03,borderRadius:"inherit"}}/><div className="sc-e">{t1.emoji}</div><div className="sc-i"><div className="sc-n">{t1.name}</div><div className={`sc-v ${pop===1?"pop":""}`} style={{color:t1.color.c}}>{s1}</div></div></div>
      <div className="sc-mid">VS</div>
      <div className="sc-card" style={{borderColor:t2.color.c+"40",background:t2.color.c+"06"}}><div style={{position:"absolute",inset:0,background:t2.color.c,opacity:.03,borderRadius:"inherit"}}/><div className="sc-e">{t2.emoji}</div><div className="sc-i"><div className="sc-n">{t2.name}</div><div className={`sc-v ${pop===2?"pop":""}`} style={{color:t2.color.c}}>{s2}</div></div></div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
