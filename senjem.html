<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>سين جيم — لعبة المعرفة والتحدي</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060F;--bg2:#080D1E;--surface:rgba(255,255,255,0.025);--surface2:rgba(255,255,255,0.04);
  --gold:#F6C90E;--gold-dim:#C9A30A;--neon-blue:#00D4FF;--neon-purple:#A855F7;
  --green:#10B981;--red:#EF4444;--txt:#E8ECF1;--dim:rgba(255,255,255,0.3);
  --r:14px;--r-lg:22px;
  --font-display:'Readex Pro',sans-serif;--font-body:'Tajawal',sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--ease-bounce:cubic-bezier(.34,1.56,.64,1);
}
html,body,#root{min-height:100vh}
body{font-family:var(--font-body);direction:rtl;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
input,textarea,select{font-family:var(--font-body)}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.2)}
input:focus,select:focus{outline:none;border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(246,201,14,0.08)}
button{font-family:var(--font-body);cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
button:disabled{opacity:.25;cursor:not-allowed;filter:none!important;transform:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes neonPulse{0%,100%{filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 20px rgba(246,201,14,.15))}50%{filter:drop-shadow(0 0 16px var(--gold)) drop-shadow(0 0 40px rgba(246,201,14,.25))}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes timerPulse{0%,100%{text-shadow:0 0 12px rgba(246,201,14,.2)}50%{text-shadow:0 0 32px rgba(246,201,14,.5)}}
@keyframes revealUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scorePop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
@keyframes letterFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(20px,-30px)}66%{transform:translate(-15px,20px)}}
@keyframes boardCellIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ═══════ BUTTONS ═══════ */
.btn{font-weight:700;font-size:15px;padding:12px 24px;border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .25s var(--ease);line-height:1.3}
.btn:not(:disabled):hover{transform:translateY(-2px)}
.btn:not(:disabled):active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0a0a0a;font-weight:800;box-shadow:0 4px 20px rgba(246,201,14,.15),0 0 0 1px rgba(246,201,14,.1)}
.btn-gold:not(:disabled):hover{box-shadow:0 8px 32px rgba(246,201,14,.25),0 0 0 1px rgba(246,201,14,.2)}
.btn-lg{width:100%;font-size:18px;padding:16px 32px;border-radius:var(--r-lg)}
.btn-ghost{background:var(--surface2);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06)}
.btn-ghost:not(:disabled):hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}

/* ═══════ SETUP ═══════ */
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;overflow:hidden}
.setup::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 600px 600px at 25% 20%,rgba(246,201,14,.03),transparent),
  radial-gradient(ellipse 500px 500px at 75% 80%,rgba(0,212,255,.02),transparent),
  radial-gradient(ellipse 400px 400px at 50% 50%,rgba(168,85,247,.015),transparent)}
.orb{position:absolute;border-radius:50%;pointer-events:none;will-change:transform}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(246,201,14,.04),transparent 70%);top:-15%;right:-10%;animation:orbFloat 20s ease-in-out infinite}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,255,.03),transparent 70%);bottom:-10%;left:-8%;animation:orbFloat 25s ease-in-out infinite 5s}

.setup-card{position:relative;z-index:1;width:100%;max-width:880px;background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(255,255,255,.01));backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.04);border-radius:28px;padding:48px 40px;animation:fadeUp .6s var(--ease)}

.logo{text-align:center;margin-bottom:6px}
.logo-main{font-family:var(--font-display);font-size:68px;font-weight:700;letter-spacing:2px}
.logo-sin{background:linear-gradient(135deg,var(--gold),#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-jim{background:linear-gradient(135deg,#FF6B6B,#E63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:16px}
.logo-sub{font-size:15px;color:var(--dim);font-weight:500;text-align:center;margin-bottom:40px;letter-spacing:2px}

.steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px}
.step-pip{height:4px;border-radius:4px;background:rgba(255,255,255,.08);transition:all .4s var(--ease);width:24px}
.step-pip.active{background:var(--gold);width:48px;box-shadow:0 0 12px rgba(246,201,14,.2)}
.step-pip.done{background:var(--green);width:24px}

.step-title{font-family:var(--font-display);font-size:21px;font-weight:600;text-align:center;margin-bottom:24px;color:var(--txt)}
.fade-step{animation:fadeUp .3s var(--ease)}

/* Team cards */
.teams-row{display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.team-card{flex:1;min-width:280px;max-width:400px;background:var(--surface);border:1px solid rgba(255,255,255,.04);border-radius:var(--r-lg);padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;transition:border-color .3s}
.team-label{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--dim)}
.team-emoji-btn{font-size:36px;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s}
.team-emoji-btn:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.emoji-dropdown{background:#12162A;border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-width:300px;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:fadeUp .2s var(--ease)}
.emoji-opt{font-size:20px;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;transition:all .12s;border:2px solid transparent}
.emoji-opt:hover{background:rgba(255,255,255,.08)}
.emoji-opt.sel{background:rgba(246,201,14,.1);border-color:var(--gold)}
.team-inp{width:100%;padding:11px 16px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#fff;font-size:17px;text-align:center;font-weight:700;transition:all .25s}
.color-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;border:2.5px solid transparent;position:relative}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.sel{border-color:rgba(255,255,255,.9);box-shadow:0 0 14px currentColor}
.vs-pill{font-family:var(--font-display);font-size:18px;font-weight:600;color:rgba(255,255,255,.06);align-self:center;letter-spacing:8px}

/* Category grid */
.cat-tools{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:8px;margin-bottom:24px;max-height:360px;overflow-y:auto;padding:2px}
.cat-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 6px 10px;border-radius:var(--r);border:1.5px solid transparent;color:#fff;transition:all .2s var(--ease);background:var(--surface);cursor:pointer;overflow:hidden}
.cat-card:hover:not(.full){background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.cat-card.sel{border-color:currentColor;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.01))}
.cat-card.full:not(.sel){opacity:.15;cursor:not-allowed;pointer-events:none}
.c-ic{font-size:28px;position:relative;z-index:1}
.c-nm{font-size:12px;font-weight:800;text-align:center;position:relative;z-index:1;line-height:1.3}
.c-tp{font-size:8px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);position:relative;z-index:1}
.c-chk{position:absolute;top:5px;left:5px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;z-index:2}
.c-glow{position:absolute;bottom:-20px;width:80px;height:40px;border-radius:50%;filter:blur(20px);opacity:0;transition:opacity .3s}
.cat-card.sel .c-glow{opacity:.3}

/* ═══════ BOARD ═══════ */
.board{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;padding:0 12px 12px}
.board::before{content:'';position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(ellipse 50% 50% at 50% 0%,rgba(246,201,14,.015),transparent),
  radial-gradient(ellipse 40% 40% at 0% 50%,rgba(0,212,255,.01),transparent),
  radial-gradient(ellipse 40% 40% at 100% 50%,rgba(168,85,247,.01),transparent)}

.board-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;gap:10px}
.b-logo{font-family:var(--font-display);font-size:22px;font-weight:700}
.b-logo .bls{background:linear-gradient(135deg,var(--gold),#FFE066);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.b-logo .blj{background:linear-gradient(135deg,#FF6B6B,#E63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.progress{height:2px;background:rgba(255,255,255,.03);border-radius:2px;margin:0 4px 12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--neon-blue));border-radius:2px;transition:width .6s var(--ease)}

.board-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:920px){.board-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.board-grid{grid-template-columns:1fr}}

.cat-blk{border-radius:var(--r-lg);overflow:hidden;display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:repeat(3,1fr);background:linear-gradient(160deg,rgba(255,255,255,.02),rgba(255,255,255,.005));border:1px solid rgba(255,255,255,.035);min-height:200px;position:relative;animation:boardCellIn .4s var(--ease-bounce) both}

.blk-mid{grid-column:2;grid-row:1/4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;gap:3px;min-width:85px;position:relative}
.blk-mid::before,.blk-mid::after{content:'';position:absolute;top:10%;bottom:10%;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.06),transparent)}
.blk-mid::before{right:0}
.blk-mid::after{left:0}
.blk-mid-ic{font-size:30px}
.blk-mid-nm{font-family:var(--font-display);font-size:11px;font-weight:600;text-align:center;line-height:1.2;max-width:75px;color:rgba(255,255,255,.6)}
.blk-mid-tp{font-size:7px;padding:2px 5px;border-radius:4px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);font-weight:700}

.qc{display:flex;align-items:center;justify-content:center;padding:16px 4px;background:transparent;color:#fff;font-family:var(--font-display);transition:all .25s var(--ease);position:relative;overflow:hidden}
.qc:not(.done):hover{background:rgba(246,201,14,.04)}
.qc:not(.done):hover .qc-pts{text-shadow:0 0 16px rgba(246,201,14,.3)}
.qc.done{cursor:default}
.qc-pts{font-size:22px;font-weight:600;transition:all .3s var(--ease)}
.qc-pts.virgin{color:var(--gold)}
.qc-pts.team-colored{font-weight:700}

/* Scoreboard */
.scoreboard{display:flex;align-items:stretch;justify-content:center;gap:12px;padding:8px 0}
.sc-card{display:flex;align-items:center;gap:12px;padding:12px 22px;border-radius:var(--r-lg);transition:all .3s var(--ease);background:var(--surface);border:1.5px solid transparent;min-width:170px;position:relative;overflow:hidden}
.sc-card::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:inherit}
.sc-card.glow::after{opacity:1}
.sc-emo{font-size:26px;position:relative;z-index:1}
.sc-info{display:flex;flex-direction:column;position:relative;z-index:1}
.sc-nm{font-size:13px;font-weight:700;opacity:.5}
.sc-pts{font-family:var(--font-display);font-size:34px;font-weight:700;line-height:1}
.sc-pts.pop{animation:scorePop .4s var(--ease-bounce)}
.sc-mid{font-family:var(--font-display);font-size:16px;color:rgba(255,255,255,.05);font-weight:700;align-self:center;letter-spacing:4px}

/* ═══════ QUESTION OVERLAY ═══════ */
.q-overlay{position:fixed;inset:0;background:rgba(2,4,12,.93);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .15s ease}
.q-modal{width:100%;max-width:680px;border-radius:var(--r-lg);overflow:hidden;background:linear-gradient(170deg,#0C1024,#080C1A);border:1px solid rgba(255,255,255,.05);box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);animation:scaleIn .35s var(--ease-bounce)}

.q-hdr{padding:16px 24px;display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:18px;font-weight:600;position:relative}
.q-hdr::after{content:'';position:absolute;bottom:0;left:5%;right:5%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.q-hdr-pts{margin-right:auto;background:rgba(0,0,0,.3);padding:4px 16px;border-radius:10px;font-size:15px;font-weight:700;border:1px solid rgba(255,255,255,.04)}

.q-body{padding:28px 24px;display:flex;flex-direction:column;align-items:center}

/* Timer */
.timer{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.tmr-display{font-family:var(--font-display);font-size:48px;font-weight:700;color:var(--gold);min-width:130px;text-align:center;letter-spacing:4px;font-variant-numeric:tabular-nums}
.tmr-display.on{animation:timerPulse 1.5s ease-in-out infinite}
.tmr-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.tmr-btn:hover{background:rgba(255,255,255,.08);color:#fff}

.q-text{font-size:24px;font-weight:700;text-align:center;line-height:1.9;margin-bottom:28px;max-width:580px}

/* Special displays */
.nw-show{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px;animation:scaleIn .4s var(--ease-bounce)}
.nw-img{width:300px;height:300px;object-fit:contain;border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
.nw-note{font-size:12px;color:rgba(255,255,255,.2);background:rgba(255,255,255,.03);padding:6px 14px;border-radius:8px}

.ph-show{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:28px;animation:scaleIn .4s var(--ease-bounce)}
.ph-img{max-width:100%;max-height:360px;object-fit:contain;border-radius:var(--r-lg);border:1px solid rgba(255,255,255,.06)}

.lt-hint{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:20px}
.lt-badge{font-family:var(--font-display);width:56px;height:56px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#0a0a0a;background:linear-gradient(135deg,var(--gold),#FFE066);box-shadow:0 4px 24px rgba(246,201,14,.2);animation:letterFloat 3s ease-in-out infinite}
.lt-label{font-size:14px;color:var(--dim);font-weight:600}

/* Answer */
.ans-wrap{width:100%;animation:revealUp .35s var(--ease)}
.ans-card{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.12);border-radius:var(--r);padding:18px 20px;text-align:center;margin-bottom:18px}
.ans-lbl{font-size:10px;font-weight:800;color:var(--green);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.ans-val{font-size:22px;font-weight:800;color:var(--green);line-height:1.5}
.ans-time{text-align:center;font-size:12px;color:var(--dim);margin-bottom:14px}
.team-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-award{font-size:15px;padding:14px 20px;border-radius:var(--r);flex:1;min-width:120px;color:#fff;font-weight:800;transition:all .25s var(--ease);position:relative;overflow:hidden}
.btn-award:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.btn-nobody{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);padding:14px 18px;border-radius:var(--r);font-weight:700;font-size:13px;min-width:90px;border:1px solid rgba(255,255,255,.04)}

/* ═══════ GAME OVER ═══════ */
.go-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px;background:var(--bg)}
.go-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(246,201,14,.03),transparent 60%)}
.go-card{text-align:center;animation:fadeUp .6s var(--ease);max-width:520px;width:100%;position:relative;z-index:1}
.go-trophy{font-size:80px;margin-bottom:12px;animation:pulse 2.5s ease-in-out infinite}
.go-title{font-family:var(--font-display);font-size:46px;font-weight:700;margin-bottom:8px;line-height:1.2}
.go-sub{font-size:15px;color:var(--dim);margin-bottom:36px}
.go-scores{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:36px}
.go-team{display:flex;flex-direction:column;align-items:center;gap:6px}
.go-emo{font-size:36px}
.go-nm{font-size:17px;font-weight:800}
.go-sc{font-family:var(--font-display);font-size:56px;font-weight:700;line-height:1}
.go-vs{font-family:var(--font-display);font-size:20px;color:rgba(255,255,255,.06);font-weight:700}
.confetti-p{position:absolute;border-radius:2px;will-change:transform}

/* ═══════ MODAL ═══════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px;animation:fadeIn .15s}
.modal{width:100%;max-width:620px;max-height:88vh;overflow-y:auto;background:linear-gradient(170deg,#0E1228,#0A0E1E);border:1px solid rgba(255,255,255,.05);border-radius:var(--r-lg);padding:28px;animation:scaleIn .3s var(--ease-bounce)}
.modal-title{font-family:var(--font-display);font-size:19px;font-weight:600;margin-bottom:20px;text-align:center}
.m-row{margin-bottom:12px}
.m-label{font-size:11px;font-weight:700;color:var(--dim);margin-bottom:5px;display:block;letter-spacing:1px}
.m-input{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#fff;font-size:15px;font-weight:600;transition:all .2s}
.m-select{width:100%;padding:10px 14px;border-radius:var(--r);border:1px solid rgba(255,255,255,.06);background:#0E1228;color:#fff;font-size:14px;font-weight:600}
.m-3col{display:flex;gap:10px}
.m-3col>div{flex:1}
.m-qblock{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);border-radius:var(--r);padding:12px;margin-bottom:8px}
.m-qpts{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px}
.m-qrow{display:flex;gap:6px;margin-bottom:6px}
.m-qrow input{flex:1}
.m-emojigrid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:6px;max-height:200px;overflow-y:auto;background:rgba(0,0,0,.2);border-radius:var(--r);padding:8px}

function useTimer(){
  const[s,setS]=useState(0);const[on,setOn]=useState(false);const r=useRef(null);
  useEffect(()=>{if(on)r.current=setInterval(()=>setS(p=>p+1),1000);else clearInterval(r.current);return()=>clearInterval(r.current)},[on]);
  return{s,on,fmt:`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`,toggle:()=>setOn(p=>!p),reset:()=>{setS(0);setOn(false)},stop:()=>setOn(false)};
}

function Confetti(){
  const cols=["#E63946","#FFD700","#3A86FF","#10B981","#A855F7","#F59E0B","#EC4899","#06B6D4"];
  const pcs=React.useMemo(()=>Array.from({length:80},(_,i)=>({i,l:Math.random()*100,d:Math.random()*3,dur:2+Math.random()*3,c:cols[~~(Math.random()*cols.length)],sz:4+Math.random()*8,rot:Math.random()*360})),[]);
  return<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999}}>
    {pcs.map(p=><div key={p.i} className="confetti-p" style={{left:`${p.l}%`,top:"-16px",width:p.sz,height:p.sz*.5,background:p.c,transform:`rotate(${p.rot}deg)`,animation:`confetti ${p.dur}s ease-in ${p.d}s forwards`}}/>)}
  </div>;
}

function CatModal({onClose,onSave}){
  const[name,setName]=useState("");
  const[icon,setIcon]=useState("❓");
  const[showIcons,setShowIcons]=useState(false);
  const[color,setColor]=useState("#E63946");
  const[type,setType]=useState("regular");
  const[qs,setQs]=useState([200,200,400,400,600,600].map(p=>({pts:p,q:"",a:"",letter:"",image:""})));
  const upQ=(i,f,v)=>{const n=[...qs];n[i]={...n[i],[f]:v};setQs(n)};

  const valid=name.trim()&&qs.every(q=>{
    if(type==="regular"||type==="letters")return q.q&&q.a;
    if(type==="no_words"||type==="guess_photo")return q.image&&q.a;
    return false;
  });

  const save=()=>{
    onSave({id:"c_"+Date.now(),name,icon,color,type,questions:qs.map(q=>{
      if(type==="regular")return{pts:q.pts,q:q.q,a:q.a};
      if(type==="letters")return{pts:q.pts,q:q.q,a:q.a,letter:q.letter};
      if(type==="no_words")return{pts:q.pts,image:q.image,a:q.a};
      if(type==="guess_photo")return{pts:q.pts,image:q.image,a:q.a};
      return q;
    })});
  };

  return<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-title">➕ إضافة تصنيف جديد</div>
      <div className="m-row"><label className="m-label">اسم التصنيف</label><input className="m-input" value={name} onChange={e=>setName(e.target.value)} placeholder="مثال: سيارات"/></div>
      <div className="m-3col">
        <div><label className="m-label">الأيقونة</label>
          <button onClick={()=>setShowIcons(!showIcons)} style={{width:"100%",padding:"10px",borderRadius:"var(--r)",border:"1px solid rgba(255,255,255,.06)",background:"rgba(255,255,255,.03)",color:"#fff",fontSize:28,cursor:"pointer",textAlign:"center"}}>{icon}</button>
          {showIcons&&<div className="m-emojigrid">{ICON_EMOJIS.map(e=><button key={e} className={`m-emo-btn ${icon===e?"sel":""}`} onClick={()=>{setIcon(e);setShowIcons(false)}}>{e}</button>)}</div>}
        </div>
        <div><label className="m-label">اللون</label><input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:"100%",height:44,border:"none",borderRadius:8,cursor:"pointer",background:"transparent"}}/></div>
        <div><label className="m-label">النوع</label>
          <select className="m-select" value={type} onChange={e=>setType(e.target.value)}>
            <option value="regular">سؤال وجواب</option>
            <option value="letters">حروف 🔤</option>
            <option value="no_words">ولا كلمة 🤫</option>
            <option value="guess_photo">خمن الصورة 🧩</option>
          </select>
        </div>
      </div>
      <div style={{marginTop:14}}><label className="m-label">الأسئلة (6 أسئلة)</label>
        {qs.map((q,i)=><div key={i} className="m-qblock">
          <div className="m-qpts">{q.pts} نقطة</div>
          {type==="regular"&&<><div className="m-qrow"><input className="m-input" placeholder="السؤال" value={q.q} onChange={e=>upQ(i,"q",e.target.value)}/></div><div className="m-qrow"><input className="m-input" placeholder="الجواب" value={q.a} onChange={e=>upQ(i,"a",e.target.value)}/></div></>}
          {type==="letters"&&<><div className="m-qrow"><input className="m-input" placeholder="السؤال" value={q.q} onChange={e=>upQ(i,"q",e.target.value)}/><input className="m-input" placeholder="حرف" value={q.letter} onChange={e=>upQ(i,"letter",e.target.value)} style={{maxWidth:50,textAlign:"center",fontWeight:900}}/></div><div className="m-qrow"><input className="m-input" placeholder="الجواب" value={q.a} onChange={e=>upQ(i,"a",e.target.value)}/></div></>}
          {(type==="no_words"||type==="guess_photo")&&<><div className="m-qrow"><input className="m-input" placeholder={type==="no_words"?"مسار الصورة: no-words/image.png":"مسار الصورة: guess/image.png"} value={q.image} onChange={e=>upQ(i,"image",e.target.value)}/></div><div className="m-qrow"><input className="m-input" placeholder="الجواب" value={q.a} onChange={e=>upQ(i,"a",e.target.value)}/></div></>}
        </div>)}
      </div>
      <div className="m-btns"><button className="btn btn-gold" style={{flex:1}} disabled={!valid} onClick={save}>💾 حفظ</button><button className="btn btn-ghost" onClick={onClose}>إلغاء</button></div>
    </div>
  </div>;
}

function App(){
  const[scr,setScr]=useState("setup");const[step,setStep]=useState(0);
  const[t1,setT1]=useState({name:"",color:COLORS[0],emoji:"⚡"});
  const[t2,setT2]=useState({name:"",color:COLORS[1],emoji:"🔥"});
  const[pool,setPool]=useState(CATS);const[sel,setSel]=useState([]);const[showModal,setShowModal]=useState(false);
  const[gc,setGc]=useState([]);const[ans,setAns]=useState({});
  const[s1,setS1]=useState(0);const[s2,setS2]=useState(0);const[pop,setPop]=useState(0);
  const[aq,setAq]=useState(null);const[sa,setSa]=useState(false);
  const[e1Open,setE1Open]=useState(false);const[e2Open,setE2Open]=useState(false);
  const tm=useTimer();

  const togCat=id=>setSel(p=>{if(p.includes(id))return p.filter(c=>c!==id);return p.length>=6?p:[...p,id]});
  const startGame=()=>{setGc(pool.filter(c=>sel.includes(c.id)));setScr("board")};
  const openQ=(ci,qi)=>{const k=`${ci}-${qi}`;if(ans[k])return;setAq({ci,qi,k,cat:gc[ci],q:gc[ci].questions[qi]});setSa(false);tm.reset();tm.toggle();setScr("question")};
  
  const award=(team)=>{
    const pts=aq.q.pts;
    if(team===1){setS1(v=>v+pts);setPop(1)}else if(team===2){setS2(v=>v+pts);setPop(2)}
    setTimeout(()=>setPop(0),500);
    finish({team,pts});
  };
  const noOne=()=>finish({team:0,pts:0});
  const finish=(res)=>{tm.stop();const na={...ans,[aq.k]:res};setAns(na);Object.keys(na).length>=gc.length*6?setTimeout(()=>setScr("gameover"),400):setScr("board")};
  
  const importJSON=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const c=d.categories||d;if(Array.isArray(c))setPool(p=>[...p,...c.map((x,i)=>({...x,id:x.id||"imp_"+Date.now()+"_"+i}))])}catch(e){alert("خطأ في الملف")}};r.readAsText(f)};inp.click()};
  
  const resetAll=()=>{setScr("setup");setStep(0);setT1({name:"",color:COLORS[0],emoji:"⚡"});setT2({name:"",color:COLORS[1],emoji:"🔥"});setSel([]);setGc([]);setAns({});setS1(0);setS2(0);setAq(null);setSa(false);tm.reset()};

  /* ═══ SETUP ═══ */
  if(scr==="setup")return<div className="setup">
    <div className="orb orb-1"/><div className="orb orb-2"/>
    <div className="setup-card">
      <div className="logo"><div className="logo-main"><span className="logo-sin">سين</span><span className="logo-jim">جيم</span></div></div>
      <div className="logo-sub">لعبة المعرفة والتحدي</div>
      <div className="steps"><div className={`step-pip ${step===0?"active":step>0?"done":""}`}/><div className={`step-pip ${step===1?"active":""}`}/></div>

      {step===0?<div className="fade-step" key="s0">
        <div className="step-title">إعداد الفريقين</div>
        <div className="teams-row">
          <div className="team-card" style={{borderColor:t1.color.c+"30"}}>
            <div className="team-label">الفريق الأول</div>
            <div className="team-emoji-btn" style={{borderColor:t1.color.c+"50",background:t1.color.c+"0A"}} onClick={()=>{setE1Open(!e1Open);setE2Open(false)}}>{t1.emoji}</div>
            {e1Open&&<div className="emoji-dropdown">{TEAM_EMOJIS.map(e=><button key={e} className={`emoji-opt ${t1.emoji===e?"sel":""}`} onClick={()=>{setT1({...t1,emoji:e});setE1Open(false)}}>{e}</button>)}</div>}
            <input className="team-inp" placeholder="اسم الفريق" value={t1.name} onChange={e=>setT1({...t1,name:e.target.value})} style={{borderColor:t1.color.c+"25"}}/>
            <div className="color-row">{COLORS.map(c=><div key={c.id} className={`color-swatch ${t1.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT1({...t1,color:c})}/>)}</div>
          </div>
          <div className="vs-pill">VS</div>
          <div className="team-card" style={{borderColor:t2.color.c+"30"}}>
            <div className="team-label">الفريق الثاني</div>
            <div className="team-emoji-btn" style={{borderColor:t2.color.c+"50",background:t2.color.c+"0A"}} onClick={()=>{setE2Open(!e2Open);setE1Open(false)}}>{t2.emoji}</div>
            {e2Open&&<div className="emoji-dropdown">{TEAM_EMOJIS.map(e=><button key={e} className={`emoji-opt ${t2.emoji===e?"sel":""}`} onClick={()=>{setT2({...t2,emoji:e});setE2Open(false)}}>{e}</button>)}</div>}
            <input className="team-inp" placeholder="اسم الفريق" value={t2.name} onChange={e=>setT2({...t2,name:e.target.value})} style={{borderColor:t2.color.c+"25"}}/>
            <div className="color-row">{COLORS.map(c=><div key={c.id} className={`color-swatch ${t2.color.id===c.id?"sel":""}`} style={{background:c.c,color:c.c}} onClick={()=>setT2({...t2,color:c})}/>)}</div>
          </div>
        </div>
        <button className="btn btn-gold btn-lg" disabled={!t1.name.trim()||!t2.name.trim()} onClick={()=>setStep(1)}>التالي ← اختيار التصنيفات</button>
      </div>

      :<div className="fade-step" key="s1">
        <button className="btn btn-ghost" style={{marginBottom:10,fontSize:12,padding:"5px 12px"}} onClick={()=>setStep(0)}>→ رجوع</button>
        <div className="step-title">اختر 6 تصنيفات <span style={{fontSize:13,background:"rgba(246,201,14,.08)",color:"var(--gold)",padding:"3px 12px",borderRadius:12,marginRight:8,fontWeight:700}}>{sel.length}/6</span></div>
        <div className="cat-tools">
          <button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={()=>setShowModal(true)}>➕ إضافة تصنيف</button>
          <button className="btn btn-ghost" style={{fontSize:12,padding:"7px 14px"}} onClick={importJSON}>📂 استيراد JSON</button>
        </div>
        <div className="cat-grid">
          {pool.map(c=>{const s=sel.includes(c.id),full=sel.length>=6&&!s;
            const tp={regular:null,no_words:"🤫 تمثيل",letters:"🔤 حروف",guess_photo:"🧩 صور"}[c.type];
            return<button key={c.id} onClick={()=>!full&&togCat(c.id)} className={`cat-card ${s?"sel":""} ${full?"full":""}`} style={{color:c.color}}>
              {s&&<div className="c-chk" style={{background:c.color}}>✓</div>}
              <span className="c-ic">{c.icon}</span><span className="c-nm">{c.name}</span>
              {tp&&<span className="c-tp">{tp}</span>}
              <div className="c-glow" style={{background:c.color}}/>
            </button>})}
        </div>
        <button className="btn btn-gold btn-lg" disabled={sel.length!==6} onClick={startGame}>🎮 ابدأ اللعبة!</button>
        {showModal&&<CatModal onClose={()=>setShowModal(false)} onSave={c=>{setPool(p=>[...p,c]);setShowModal(false)}}/>}
      </div>}
    </div>
  </div>;

  /* ═══ QUESTION ═══ */
  if(scr==="question"&&aq){
    const{cat,q}=aq;const isNW=cat.type==="no_words",isLT=cat.type==="letters",isPH=cat.type==="guess_photo";
    return<div className="q-overlay"><div className="q-modal">
      <div className="q-hdr" style={{background:`linear-gradient(135deg,${cat.color},${cat.color}CC)`}}><span>{cat.icon}</span><span>{cat.name}</span><span className="q-hdr-pts">{q.pts}</span></div>
      <div className="q-body">
        <div className="timer">
          <button className="tmr-btn" onClick={tm.toggle}>{tm.on?"⏸":"▶"}</button>
          <div className={`tmr-display ${tm.on?"on":""}`}>{tm.fmt}</div>
          <button className="tmr-btn" onClick={tm.reset}>↻</button>
        </div>

        {isNW&&!sa&&<div className="nw-show">
          <img className="nw-img" src={`images/${q.image}`} alt="" onError={e=>{e.target.src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><rect fill='%23111' width='300' height='300'/><text x='150' y='160' text-anchor='middle' fill='%23555' font-size='14'>"+encodeURIComponent(q.image)+"</text></svg>"}}/>
          <div className="nw-note">🤫 اعرض للاعب فقط — يشرح بدون كلام!</div>
        </div>}

        {isPH&&!sa&&<div className="ph-show">
          <img className="ph-img" src={`images/${q.image}`} alt="" onError={e=>{e.target.src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='600' height='350'><rect fill='%23111' width='600' height='350'/><text x='300' y='180' text-anchor='middle' fill='%23555' font-size='14'>"+encodeURIComponent(q.image)+"</text></svg>"}}/>
        </div>}

        {isLT&&<><div className="lt-hint"><span className="lt-label">الجواب يبدأ بحرف</span><div className="lt-badge">{q.letter}</div></div><p className="q-text">{q.q}</p></>}

        {!isNW&&!isLT&&!isPH&&<p className="q-text">{q.q}</p>}

        {!sa?<button className="btn btn-gold" style={{fontSize:19,padding:"15px 40px"}} onClick={()=>{setSa(true);tm.stop()}}>🔍 كشف الإجابة</button>
        :<div className="ans-wrap">
          <div className="ans-card"><div className="ans-lbl">الإجابة</div><p className="ans-val">{q.a}</p></div>
          <div className="ans-time">⏱️ {tm.fmt}</div>
          <div className="team-btns">
            <button className="btn-award" style={{background:`linear-gradient(135deg,${t1.color.c},${t1.color.l})`}} onClick={()=>award(1)}>✓ {t1.emoji} {t1.name}</button>
            <button className="btn-award" style={{background:`linear-gradient(135deg,${t2.color.c},${t2.color.l})`}} onClick={()=>award(2)}>✓ {t2.emoji} {t2.name}</button>
            <button className="btn btn-nobody" onClick={noOne}>لا أحد</button>
          </div>
        </div>}
      </div>
    </div></div>;
  }

  /* ═══ GAMEOVER ═══ */
  if(scr==="gameover"){
    const w=s1>s2?1:s2>s1?2:0;const wt=w===1?t1:w===2?t2:null;
    return<div className="go-wrap">{w!==0&&<Confetti/>}<div className="go-card">
      <div className="go-trophy">{wt?wt.emoji:"🤝"}</div>
      <h1 className="go-title" style={wt?{background:`linear-gradient(135deg,${wt.color.c},${wt.color.l})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}:{color:"var(--gold)"}}>{w===1?`${t1.name} فازوا!`:w===2?`${t2.name} فازوا!`:"تعادل!"}</h1>
      <div className="go-sub">{wt?`بفارق ${Math.abs(s1-s2)} نقطة`:"نتيجة متساوية!"}</div>
      <div className="go-scores">
        <div className="go-team"><div className="go-emo">{t1.emoji}</div><div className="go-nm" style={{color:t1.color.c}}>{t1.name}</div><div className="go-sc" style={{color:t1.color.c}}>{s1}</div></div>
        <div className="go-vs">—</div>
        <div className="go-team"><div className="go-emo">{t2.emoji}</div><div className="go-nm" style={{color:t2.color.c}}>{t2.name}</div><div className="go-sc" style={{color:t2.color.c}}>{s2}</div></div>
      </div>
      <button className="btn btn-gold btn-lg" style={{maxWidth:360,margin:"0 auto"}} onClick={resetAll}>🔄 لعبة جديدة</button>
    </div></div>;
  }

  /* ═══ BOARD ═══ */
  const rows=[[0,1],[2,3],[4,5]];const anN=Object.keys(ans).length;const totQ=gc.length*6;
  const cellStyle=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return{};const tc=a.team===1?t1.color:a.team===2?t2.color:null;return tc?{background:`${tc.c}15`,boxShadow:`inset 0 0 20px ${tc.c}08`}:{opacity:.2}};
  const cellPts=(ci,qi)=>{const k=`${ci}-${qi}`;const a=ans[k];if(!a)return{cls:"virgin",style:{}};const tc=a.team===1?t1.color.l:a.team===2?t2.color.l:"rgba(255,255,255,.1)";return{cls:"team-colored",style:{color:tc}}};

  return<div className="board">
    <div className="board-hdr">
      <div className="b-logo"><span className="bls">سين</span> <span className="blj">جيم</span></div>
      <div style={{flex:1}}/>
      <button className="btn btn-ghost" style={{fontSize:11,padding:"5px 12px"}} onClick={()=>setScr("gameover")}>🏁 إنهاء</button>
    </div>
    <div className="progress"><div className="progress-bar" style={{width:`${totQ?(anN/totQ)*100:0}%`}}/></div>

    <div className="board-grid">
      {gc.map((cat,ci)=><div key={cat.id} className="cat-blk" style={{animationDelay:`${ci*.06}s`,borderColor:cat.color+"12"}}>
        {rows.map(([li],ri)=>{const k=`${ci}-${li}`;const d=!!ans[k];const cp=cellPts(ci,li);
          return<button key={`l${ri}`} className={`qc ${d?"done":""}`} style={{gridColumn:1,gridRow:ri+1,...cellStyle(ci,li)}} onClick={()=>openQ(ci,li)} disabled={d}>
            <span className={`qc-pts ${cp.cls}`} style={cp.style}>{cat.questions[li].pts}</span>
          </button>})}
        <div className="blk-mid" style={{background:cat.color+"08"}}>
          <span className="blk-mid-ic">{cat.icon}</span>
          <span className="blk-mid-nm">{cat.name}</span>
          {cat.type!=="regular"&&<span className="blk-mid-tp">{{no_words:"تمثيل",letters:"حروف",guess_photo:"صور"}[cat.type]}</span>}
        </div>
        {rows.map(([,ri2],ri)=>{const k=`${ci}-${ri2}`;const d=!!ans[k];const cp=cellPts(ci,ri2);
          return<button key={`r${ri}`} className={`qc ${d?"done":""}`} style={{gridColumn:3,gridRow:ri+1,...cellStyle(ci,ri2)}} onClick={()=>openQ(ci,ri2)} disabled={d}>
            <span className={`qc-pts ${cp.cls}`} style={cp.style}>{cat.questions[ri2].pts}</span>
          </button>})}
      </div>)}
    </div>

    <div className="scoreboard">
      <div className="sc-card" style={{borderColor:t1.color.c+"40",background:t1.color.c+"06"}}>
        <div className="sc-emo">{t1.emoji}</div>
        <div className="sc-info"><div className="sc-nm">{t1.name}</div><div className={`sc-pts ${pop===1?"pop":""}`} style={{color:t1.color.c}}>{s1}</div></div>
      </div>
      <div className="sc-mid">VS</div>
      <div className="sc-card" style={{borderColor:t2.color.c+"40",background:t2.color.c+"06"}}>
        <div className="sc-emo">{t2.emoji}</div>
        <div className="sc-info"><div className="sc-nm">{t2.name}</div><div className={`sc-pts ${pop===2?"pop":""}`} style={{color:t2.color.c}}>{s2}</div></div>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
